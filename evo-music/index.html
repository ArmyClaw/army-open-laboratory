<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evo Music — 在线音乐播放器</title>
<meta property="og:title" content="Evo Music — 在线音乐播放器">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121018;
  --bg-card: #1a1724;
  --bg-card-hover: #221e30;
  --indigo: #7c3aed;
  --indigo-dim: rgba(124,58,237,0.15);
  --indigo-glow: rgba(124,58,237,0.3);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,0.12);
  --text: #e8e0f0;
  --text-dim: #8b7fa8;
  --text-mid: #a99cc0;
  --groove: rgba(124,58,237,0.04);
  --border: rgba(124,58,237,0.1);
}
* { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior: smooth }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
  max-width: 100vw;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-radial-gradient(circle at 50% 40%, transparent 0px, transparent 3px, var(--groove) 3px, var(--groove) 4px),
    repeating-radial-gradient(circle at 50% 40%, transparent 0px, transparent 18px, rgba(124,58,237,0.02) 18px, rgba(124,58,237,0.02) 19px);
  background-size: 100% 100%;
  z-index: 0;
  pointer-events: none;
}
.ambient-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.ambient-glow.g1 { top: -15%; left: -10%; width: 600px; height: 600px; background: rgba(124,58,237,0.08); }
.ambient-glow.g2 { bottom: -10%; right: -8%; width: 500px; height: 500px; background: rgba(236,72,153,0.05); }
.ambient-glow.g3 { top: 30%; right: -15%; width: 350px; height: 350px; background: rgba(124,58,237,0.06); }
a { color: var(--indigo); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--pink); }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(18,16,24,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 1rem; color: var(--text);
  letter-spacing: 0.02em;
}
.nav-brand em { font-style: normal; color: var(--indigo); }
.nav-vinyl {
  width: 28px; height: 28px;
  border: 2px solid var(--indigo);
  border-radius: 50%;
  position: relative;
  animation: spin 4s linear infinite;
  opacity: 0.8;
}
.nav-vinyl::after {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid var(--indigo-glow);
  border-radius: 50%;
}
.nav-vinyl::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 5px; height: 5px;
  background: var(--pink);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--pink);
}
@keyframes spin { to { transform: rotate(360deg) } }
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.3), 0 0 60px rgba(124,58,237,0.15); }
  50% { box-shadow: 0 0 40px rgba(124,58,237,0.6), 0 0 100px rgba(124,58,237,0.3), 0 0 150px rgba(236,72,153,0.15); }
}
@keyframes particleRise {
  0% { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-30px) scale(0.3); }
}
.nav-links {
  display: flex; gap: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.nav-links a { color: var(--text-dim); }
.nav-links a:hover { color: var(--text); }

/* HERO */
.hero {
  position: relative; z-index: 1;
  padding: 80px 20px 10px;
  display: flex; flex-direction: column; align-items: center;
  max-width: 640px; margin: 0 auto;
}
.vinyl-container {
  position: relative;
  width: clamp(160px, 35vw, 260px);
  height: clamp(160px, 35vw, 260px);
  margin-bottom: -40px;
  z-index: 2;
  cursor: pointer;
  transition: filter 0.3s;
}
.vinyl-container:hover { filter: brightness(1.1); }
.vinyl-record {
  width: 100%; height: 100%;
  border-radius: 50%;
  background:
    radial-gradient(circle, var(--bg) 12%, transparent 12.5%),
    conic-gradient(from 0deg, #1a1724, #201c2e, #1a1724, #221e30, #1a1724, #201c2e, #1a1724),
    radial-gradient(circle, transparent 22%, rgba(124,58,237,0.06) 22.5%, transparent 23%),
    radial-gradient(circle, transparent 28%, rgba(124,58,237,0.04) 28.3%, transparent 28.6%),
    radial-gradient(circle, transparent 34%, rgba(124,58,237,0.05) 34.3%, transparent 34.6%),
    radial-gradient(circle, transparent 40%, rgba(124,58,237,0.03) 40.3%, transparent 40.6%),
    radial-gradient(circle, transparent 46%, rgba(236,72,153,0.03) 46.3%, transparent 46.6%),
    radial-gradient(circle, transparent 52%, rgba(124,58,237,0.04) 52.3%, transparent 52.6%),
    radial-gradient(circle, transparent 58%, rgba(124,58,237,0.03) 58.3%, transparent 58.6%),
    radial-gradient(circle, transparent 64%, rgba(236,72,153,0.02) 64.3%, transparent 64.6%),
    radial-gradient(circle, transparent 70%, rgba(124,58,237,0.04) 70.3%, transparent 70.6%),
    radial-gradient(circle, transparent 76%, rgba(124,58,237,0.03) 76.3%, transparent 76.6%),
    radial-gradient(circle, transparent 82%, rgba(236,72,153,0.02) 82.3%, transparent 82.6%),
    radial-gradient(circle, transparent 88%, rgba(124,58,237,0.04) 88.3%, transparent 88.6%),
    radial-gradient(circle, #0e0c14 96%, #1a1724 100%);
  box-shadow:
    0 0 0 3px rgba(124,58,237,0.15),
    0 0 40px rgba(124,58,237,0.1),
    0 0 80px rgba(124,58,237,0.05),
    inset 0 0 30px rgba(0,0,0,0.5);
  animation: spin 8s linear infinite;
  position: relative;
  transition: animation-duration 0.5s, box-shadow 0.5s;
}
.vinyl-record.playing {
  animation-duration: 1.5s;
  animation-name: spin;
  box-shadow:
    0 0 0 3px rgba(124,58,237,0.3),
    0 0 40px rgba(124,58,237,0.3),
    0 0 80px rgba(124,58,237,0.15),
    0 0 120px rgba(124,58,237,0.08),
    inset 0 0 30px rgba(0,0,0,0.5);
}
.vinyl-record.glow-pulse {
  animation: spin 1.5s linear infinite, pulseGlow 1.5s ease-in-out infinite;
}
.vinyl-record.stopped { animation-play-state: paused; }
.vinyl-label {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 38%; height: 38%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--indigo), #5b21b6);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
}
.vinyl-label-text {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(0.45rem, 1.8vw, 0.7rem);
  color: rgba(255,255,255,0.9);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.vinyl-label-text small {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.55em;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-top: 4px;
}
.vinyl-spindle {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 8px; height: 8px;
  background: #0e0c14;
  border-radius: 50%;
  z-index: 3;
  box-shadow: 0 0 0 2px rgba(236,72,153,0.4);
}
.hero-freq {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 60px;
  margin-bottom: 8px;
  text-align: center;
}
.hero h1 {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.5rem);
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -0.01em;
  text-align: center;
}
.hero h1 .accent { color: var(--indigo); }
.hero h1 .hot { color: var(--pink); }
#nowPlaying {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--indigo);
  text-align: center;
  margin-top: 8px;
  min-height: 1.2em;
}

/* MAIN */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 60px;
  position: relative; z-index: 1;
}
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* TRACK LIST — horizontal scroll */
.track-list {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 30px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--indigo-dim) transparent;
}
.track-list::-webkit-scrollbar { height: 6px; }
.track-list::-webkit-scrollbar-track { background: transparent; }
.track-list::-webkit-scrollbar-thumb { background: var(--indigo-dim); border-radius: 3px; }
.track-card {
  flex-shrink: 0;
  width: 180px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.track-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--indigo-glow);
  transform: translateY(-2px);
}
.track-card.active {
  border-color: var(--indigo);
  background: var(--indigo-dim);
  box-shadow: 0 0 20px var(--indigo-dim);
}
.track-play-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--indigo);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  color: var(--indigo);
}
.track-card.active .track-play-btn {
  background: var(--indigo);
  color: #fff;
  box-shadow: 0 0 12px var(--indigo-glow);
}
.track-play-btn svg { width: 14px; height: 14px; fill: currentColor; }
.track-info { text-align: center; width: 100%; }
.track-name {
  font-family: 'Archivo Black', sans-serif;
  font-size: 0.8rem;
  color: var(--text);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-card.active .track-name { color: var(--pink); }
.track-artist {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* CONTROLS */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.ctrl-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctrl-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
}
.ctrl-val {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--indigo);
  min-width: 32px;
  text-align: right;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--indigo);
  cursor: pointer;
  box-shadow: 0 0 8px var(--indigo-glow);
}
select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  outline: none;
  cursor: pointer;
}
select:focus { border-color: var(--indigo); }
.btn {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-card);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--indigo); background: var(--indigo-dim); }
.btn.active { border-color: var(--indigo); background: var(--indigo); color: #fff; }
.btn.pink { border-color: var(--pink); color: var(--pink); }
.btn.pink:hover { background: var(--pink-dim); }
.btn.danger { border-color: #ef4444; color: #ef4444; }
.btn.danger:hover { background: rgba(239,68,68,0.1); }

/* PIANO ROLL */
.piano-roll-wrap {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--bg-card);
  margin-bottom: 20px;
}
.piano-roll-hdr {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.piano-roll-canvas-wrap {
  position: relative;
  overflow-x: auto;
  overflow-y: auto;
  max-height: 380px;
  background: #0d0b12;
}
.piano-roll-canvas-wrap canvas {
  display: block;
  cursor: crosshair;
}

/* SPECTRUM */
.spectrum-wrap {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--bg-card);
}
.spectrum-hdr {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
}
.spectrum-body {
  position: relative;
  padding: 20px 16px;
  height: 140px;
  width: 100%;
  overflow: hidden;
}
.spectrum-bars-container {
  position: absolute;
  bottom: 20px;
  left: 16px;
  right: 16px;
  height: 80px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 2px;
}
.spectrum-reflection {
  position: absolute;
  top: 50%;
  left: 16px;
  right: 16px;
  height: 40px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 2px;
  transform: scaleY(-1);
  opacity: 0.2;
  filter: blur(2px);
  -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
  pointer-events: none;
}
.spectrum-bar {
  width: 4px;
  min-height: 2px;
  border-radius: 2px 2px 0 0;
  transition: height 0.05s linear;
  box-shadow: 0 0 4px rgba(124,58,237,0.3);
}
.spectrum-bar.reflect {
  border-radius: 0 0 2px 2px;
  box-shadow: none;
}
#waveformCanvas {
  position: absolute;
  top: 10px;
  left: 16px;
  right: 16px;
  bottom: 10px;
  width: calc(100% - 32px);
  height: calc(100% - 20px);
  pointer-events: none;
}

/* PARTICLES */
.particle-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 5;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  pointer-events: none;
  animation: particleRise 0.8s ease-out forwards;
}

/* FOOTER */
.footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 36px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  border-top: 1px solid var(--border);
}
.footer .pink { color: var(--pink); }

/* FADE TRANSITION */
.fade-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.fade-overlay.active { opacity: 0.6; }

/* MOBILE */
@media (max-width: 768px) {
  .nav { padding: 0 12px; height: 46px; }
  .nav-links { gap: 10px; font-size: 0.55rem; }
  .hero { padding-top: 60px; }
  .vinyl-container { width: clamp(130px, 38vw, 180px); height: clamp(130px, 38vw, 180px); margin-bottom: -30px; }
  .hero-freq { margin-top: 45px; font-size: 0.55rem; }
  .hero h1 { font-size: clamp(1.3rem, 5vw, 1.8rem); }
  .track-card { width: 150px; padding: 10px; }
  .track-name { font-size: 0.7rem; }
  .track-play-btn { width: 34px; height: 34px; }
  .controls { gap: 6px; padding: 10px 10px; }
  input[type="range"] { width: 60px; }
  .ctrl-label { font-size: 0.5rem; }
  .btn { padding: 6px 10px; font-size: 0.55rem; }
  .piano-roll-canvas-wrap { max-height: 300px; }
  .spectrum-body { height: 110px; padding: 14px 10px; }
  .spectrum-bars-container, .spectrum-reflection { left: 10px; right: 10px; }
  #waveformCanvas { left: 10px; width: calc(100% - 20px); }
  .section-label { font-size: 0.5rem; }
  .main { padding: 14px 10px 40px; }
}
@media (max-width: 400px) {
  body { font-size: 14px; }
  .hero h1 { font-size: 1.2rem; }
  .controls { flex-direction: column; align-items: flex-start; }
  .track-card { width: 135px; }
}
</style>
</head>
<body>

<div class="ambient-glow g1"></div>
<div class="ambient-glow g2"></div>
<div class="ambient-glow g3"></div>
<div class="fade-overlay" id="fadeOverlay"></div>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-vinyl"></div>
    <span>EVO <em>MUSIC</em></span>
  </div>
  <div class="nav-links">
    <a href="/">home</a>
    <a href="/study/">lab</a>
    <a href="https://github.com/ArmyClaw/evo-music" target="_blank">github</a>
  </div>
</nav>

<section class="hero">
  <div class="vinyl-container" id="vinylContainer" title="点击播放/暂停">
    <div class="vinyl-record" id="vinylRecord">
      <div class="vinyl-label">
        <div class="vinyl-label-text">
          evo<span class="hot" style="color:var(--pink)">&#8226;</span>music
          <small>player</small>
        </div>
      </div>
      <div class="vinyl-spindle"></div>
    </div>
  </div>
  <div class="hero-freq">online music player</div>
  <h1>Web Audio <span class="accent">合成器</span></h1>
  <div id="nowPlaying"></div>
</section>

<div class="main">
  <div class="section-label">// 曲库 Presets</div>
  <div class="track-list" id="trackList"></div>

  <div class="section-label">// 控制面板</div>
  <div class="controls">
    <button class="btn" id="btnPlay" onclick="togglePlay()">&#9654; Play</button>
    <button class="btn" id="btnStop" onclick="stopPlay()">&#9632; Stop</button>
    <button class="btn danger" onclick="clearNotes()">Clear</button>
    <div class="ctrl-group">
      <span class="ctrl-label">BPM</span>
      <input type="range" id="bpmSlider" min="60" max="200" value="120" oninput="updateBPM(this.value)">
      <span class="ctrl-val" id="bpmVal">120</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Wave</span>
      <select id="waveSelect" onchange="currentWave=this.value">
        <option value="sine">Sine</option>
        <option value="square">Square</option>
        <option value="sawtooth">Sawtooth</option>
        <option value="triangle">Triangle</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Scale</span>
      <select id="scaleSelect" onchange="currentScale=this.value;drawPianoRoll()">
        <option value="major">C Major</option>
        <option value="minor">A Minor</option>
        <option value="pentatonic">Pentatonic</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Vol</span>

/* ═══════════════════════════════════════

   ═══════════════════════════════════════ */
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.8;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = volume;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
  reverbNode = createReverb();
  startSpectrum();
}

function createReverb() {
  if (!audioCtx) return;
  var len = audioCtx.sampleRate * 1.5;
  var buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
  for (var ch = 0; ch < 2; ch++) {
    var d = buf.getChannelData(ch);
    for (var i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
  }
  var conv = audioCtx.createConvolver();
  conv.buffer = buf;
  var revGain = audioCtx.createGain();
  revGain.gain.value = 0.4;
  conv.connect(revGain);
  revGain.connect(audioCtx.destination);
  return conv;
}

function playNote(freq, startTime, duration, midiNote) {
  var now = startTime;
  var noteGain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(4000, now);
  filter.frequency.exponentialRampToValueAtTime(800, now + duration * 0.6);
  filter.Q.setValueAtTime(1, now);
  noteGain.gain.setValueAtTime(0.001, now);
  var attackTime = Math.min(0.06, duration * 0.15);
  var decayTime = Math.min(0.15, duration * 0.25);
  var sustainLevel = 0.18;
  var releaseTime = Math.min(0.4, duration * 0.35);
  noteGain.gain.linearRampToValueAtTime(0.22, now + attackTime);
  noteGain.gain.linearRampToValueAtTime(sustainLevel, now + attackTime + decayTime);
  noteGain.gain.setValueAtTime(sustainLevel, now + duration - releaseTime);
  noteGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
 filter.connect(noteGain);
  noteGain.connect(masterGain);
  var harmonics = [1, 2, 3, 4];
  var harmonicGains = [1, 0.35, 0.12, 0.05];
  for (var h = 0; h < harmonics.length; h++) {
    var hOsc = audioCtx.createOscillator();
    var hGain = audioCtx.createGain();
    var detune = (Math.random() - 0.5) * 4;
    hOsc.type = currentWave;
    if (h === 0) {
      hOsc.frequency.setValueAtTime(freq, now);
    } else {
      hOsc.frequency.setValueAtTime(freq * harmonics[h], now);
      hGain.gain.setValueAtTime(harmonicGains[h], now);
    }
    hOsc.detune.setValueAtTime(detune, now);
    if (h === 0) hGain.gain.setValueAtTime(1, now);
    hOsc.connect(hGain);
    hGain.connect(filter);
    hOsc.start(now);
    hOsc.stop(now + duration + 0.05);
    scheduledOscs.push(hOsc);
  }
  if (reverbNode) {
    var revSend = audioCtx.createGain();
    revSend.gain.setValueAtTime(0.15, now);
    revSend.gain.linearRampToValueAtTime(0.08, now + duration);
    var revOsc = audioCtx.createOscillator();
    var revGain = audioCtx.createGain();
    revOsc.type = currentWave;
    revOsc.frequency.setValueAtTime(freq, now);
    revOsc.connect(revGain);
    revGain.connect(revSend);
    revSend.connect(reverbNode);
    revOsc.start(now);
    revOsc.stop(now + duration + 0.1);
    scheduledOscs.push(revOsc);
  }

  /* Schedule glow highlight */
  if (midiNote !== undefined) {
    var delayMs = Math.max(0, (startTime - audioCtx.currentTime) * 1000);
    var durMs = duration * 1000;
    (function(mn, d) {
      setTimeout(function() {
        glowActiveNotes[mn] = Date.now() + d * 0.8;
        spawnParticle(mn);
        drawPianoRoll();
      }, delayMs);
    })(midiNote, duration);
  }
}

/* ═══════════════════════════════════════
   TRACK LIST UI (horizontal cards)
   ═══════════════════════════════════════ */
function renderTrackList() {
  var container = document.getElementById('trackList');
  var html = '';
  for (var i = 0; i < songs.length; i++) {
    var s = songs[i];
    var activeClass = (i === currentSongIndex) ? ' active' : '';
    html += '<div class="track-card' + activeClass + '" onclick="loadSong(' + i + ')" data-idx="' + i + '">';
    html += '<div class="track-play-btn"><svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"></polygon></svg></div>';
    html += '<div class="track-info"><div class="track-name">' + s.name + '</div>';
    html += '<div class="track-artist">' + s.artist + '</div></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

/* ═══════════════════════════════════════
   FADE TRANSITION
   ═══════════════════════════════════════ */
function fadeTransition(callback) {
  var overlay = document.getElementById('fadeOverlay');
  overlay.classList.add('active');
  setTimeout(function() {
    callback();
    setTimeout(function() {
      overlay.classList.remove('active');
    }, 100);
  }, 300);
}

/* ═══════════════════════════════════════
   LOAD SONG
   ═══════════════════════════════════════ */
function loadSong(idx) {
  initAudio();
  fadeTransition(function() {
    stopPlay();
    currentSongIndex = idx;
    activeSongNotes = songs[idx].notes.slice();
    clearGrid();
    for (var i = 0; i < activeSongNotes.length; i++) {
      var note = activeSongNotes[i];
      var row = midiToRow(note.n);
      if (row >= 0 && row < ROWS) {
        var col = Math.floor(note.t);
        if (col >= 0 && col < COLS) {
          noteGrid[row][col] = true;
        }
      }
    }
    renderTrackList();
    drawPianoRoll();
    document.getElementById('nowPlaying').innerHTML = '&#9835; ' + songs[idx].name + ' — ' + songs[idx].artist;
    togglePlay();
  });
}

function midiToRow(midi) {
  return ROWS - 1 - Math.max(0, Math.min(ROWS - 1, midi - 48));
}
function rowToMidi(row) { return 48 + (ROWS - 1 - row); }

/* ═══════════════════════════════════════
   PIANO ROLL
   ═══════════════════════════════════════ */
var pianoCanvas, pianoCtx;

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r,r,r,r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
    return this;
  };
}

function initPianoRoll() {
  pianoCanvas = document.getElementById('pianoRollCanvas');
  pianoCtx = pianoCanvas.getContext('2d');
  resizePianoRoll();
  drawPianoRoll();
  pianoCanvas.addEventListener('click', onPianoRollClick);
  window.addEventListener('resize', function() { resizePianoRoll(); drawPianoRoll(); });
}

function resizePianoRoll() {
  var wrap = document.getElementById('pianoRollWrap');
  var wrapW = wrap.clientWidth;
  var totalW = LABEL_W + COLS * CELL_W;
  pianoCanvas.width = Math.max(totalW, wrapW);
  pianoCanvas.height = ROWS * CELL_H;
  pianoCanvas.style.width = Math.max(totalW, wrapW) + 'px';
  pianoCanvas.style.height = (ROWS * CELL_H) + 'px';
}

function drawPianoRoll() {
  if (!pianoCtx) return;
  var ctx = pianoCtx;
  var w = pianoCanvas.width;
  var h = pianoCanvas.height;
  ctx.clearRect(0, 0, w, h);

  /* Grid */
  ctx.strokeStyle = 'rgba(124,58,237,0.08)';
  ctx.lineWidth = 1;
  for (var c = 0; c <= COLS; c++) {
    var x = LABEL_W + c * CELL_W;
    ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, h); ctx.stroke();
  }
  for (var r = 0; r <= ROWS; r++) {
    var y = r * CELL_H;
    ctx.beginPath(); ctx.moveTo(LABEL_W, y + 0.5); ctx.lineTo(w, y + 0.5); ctx.stroke();
  }

  /* Labels */
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  var noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  for (var r = 0; r < ROWS; r++) {
    var midi = rowToMidi(r);
    var name = noteNames[midi % 12] + Math.floor(midi / 12 - 1);
    var isBlack = [1,3,6,8,10].indexOf(midi % 12) >= 0;
    if (isBlack) {
      ctx.fillStyle = 'rgba(124,58,237,0.06)';
      ctx.fillRect(0, r * CELL_H, LABEL_W, CELL_H);
      ctx.fillRect(LABEL_W, r * CELL_H, w - LABEL_W, CELL_H);
    }
    ctx.fillStyle = isBlack ? '#6b5f80' : '#8b7fa8';
    ctx.fillText(name, LABEL_W - 4, r * CELL_H + CELL_H / 2);
  }

  /* Separator */
  ctx.strokeStyle = 'rgba(124,58,237,0.2)';
  ctx.beginPath(); ctx.moveTo(LABEL_W + 0.5, 0); ctx.lineTo(LABEL_W + 0.5, h); ctx.stroke();

  /* Notes + glow trails */
  var now = Date.now();
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (noteGrid[r][c]) {
        var x = LABEL_W + c * CELL_W + 1;
        var y = r * CELL_H + 1;
        var nw = CELL_W - 2;
        var nh = CELL_H - 2;
        var hue = 260 + (c / COLS) * 60;
        var isActive = (playCol === c);
        var midi = rowToMidi(r);
        var glowEnd = glowActiveNotes[midi];
        var isGlowing = glowEnd && now < glowEnd;

        if (isActive) {
          ctx.shadowColor = 'rgba(236,72,153,0.8)';
          ctx.shadowBlur = 15;
          ctx.fillStyle = 'rgba(236,72,153,0.95)';
        } else if (isGlowing) {
          ctx.shadowColor = 'rgba(124,58,237,0.7)';
          ctx.shadowBlur = 12;
          ctx.fillStyle = 'hsla(' + hue + ', 90%, 70%, 0.95)';
        } else {
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'hsla(' + hue + ', 80%, 60%, 0.85)';
        }
        ctx.beginPath();
        ctx.roundRect(x, y, nw, nh, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  /* Playhead */
  if (playCol >= 0 && playCol < COLS) {
    var px = LABEL_W + playCol * CELL_W;
    ctx.fillStyle = 'rgba(236,72,153,0.12)';
    ctx.fillRect(px, 0, CELL_W, h);
    ctx.strokeStyle = 'rgba(236,72,153,0.7)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(236,72,153,0.5)';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, h); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  /* Clean expired glows */
  for (var k in glowActiveNotes) {
    if (now >= glowActiveNotes[k]) {
      delete glowActiveNotes[k];
    }
  }
}

function onPianoRollClick(e) {
  var rect = pianoCanvas.getBoundingClientRect();
  var scaleX = pianoCanvas.width / rect.width;
  var scaleY = pianoCanvas.height / rect.height;
  var mx = (e.clientX - rect.left) * scaleX;
  var my = (e.clientY - rect.top) * scaleY;
  var col = Math.floor((mx - LABEL_W) / CELL_W);
  var row = Math.floor(my / CELL_H);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
  noteGrid[row][col] = !noteGrid[row][col];
  if (noteGrid[row][col]) {
    activeSongNotes.push({n: rowToMidi(row), t: col, d: 1});
  } else {
    for (var i = activeSongNotes.length - 1; i >= 0; i--) {
      if (activeSongNotes[i].n === rowToMidi(row) && Math.floor(activeSongNotes[i].t) === col) {
        activeSongNotes.splice(i, 1); break;
      }
    }
  }
  drawPianoRoll();
}

/* ═══════════════════════════════════════
   PARTICLES
   ═══════════════════════════════════════ */
function spawnParticle(midiNote) {
  var container = document.getElementById('particleContainer');
  var row = midiToRow(midiNote);
  if (row < 0 || row >= ROWS) return;
  /* Find which column is currently playing */
  if (playCol < 0) return;
  var x = LABEL_W + playCol * CELL_W + CELL_W / 2;
  var y = row * CELL_H + CELL_H / 2;

  /* Get canvas scale */
  var rect = pianoCanvas.getBoundingClientRect();
  var scaleX = rect.width / pianoCanvas.width;
  var scaleY = rect.height / pianoCanvas.height;
  x = x * scaleX;
  y = y * scaleY;

  for (var i = 0; i < 3; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var hue = 260 + Math.random() * 60;
    p.style.left = (x + (Math.random() - 0.5) * 12) + 'px';
    p.style.top = y + 'px';
    p.style.background = 'hsla(' + hue + ', 80%, 70%, 0.8)';
    p.style.boxShadow = '0 0 4px hsla(' + hue + ', 80%, 70%, 0.6)';
    p.style.width = (3 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
    container.appendChild(p);
    (function(el) {
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1000);
    })(p);
  }
}

/* ═══════════════════════════════════════
   PLAYBACK
   ═══════════════════════════════════════ */
function togglePlay() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) { pausePlay(); return; }
  if (activeSongNotes.length === 0) return;

  isPlaying = true;
  document.getElementById('btnPlay').innerHTML = '&#10074;&#10074; Pause';
  document.getElementById('vinylRecord').classList.add('playing');
  document.getElementById('vinylRecord').classList.add('glow-pulse');
  document.getElementById('vinylRecord').classList.remove('stopped');

  var maxBeat = 0;
  for (var i = 0; i < activeSongNotes.length; i++) {
    var endBeat = activeSongNotes[i].t + activeSongNotes[i].d;
    if (endBeat > maxBeat) maxBeat = endBeat;
  }
  var totalBeats = Math.ceil(maxBeat) + 1;
  var beatDur = 60 / bpm;
  var startTime = audioCtx.currentTime + 0.05;

  for (var i = 0; i < activeSongNotes.length; i++) {
    var note = activeSongNotes[i];
    var t = startTime + note.t * beatDur;
    var d = Math.max(0.1, note.d * beatDur);
    playNote(midiToFreq(note.n), t, d, note.n);
  }

  var startT = performance.now();
  var totalDurMs = totalBeats * beatDur * 1000;
  glowActiveNotes = {};

  function animate() {
    if (!isPlaying) return;
    var elapsed = performance.now() - startT;
    var currentBeat = elapsed / (beatDur * 1000);
    playCol = Math.floor(currentBeat);
    drawPianoRoll();
    if (playCol < COLS && elapsed < totalDurMs) {
      requestAnimationFrame(animate);
    } else {
      stopPlay();
    }
  }
  requestAnimationFrame(animate);

  var autoStop = setTimeout(function() { if (isPlaying) stopPlay(); }, totalDurMs + 200);
  playTimeouts.push(autoStop);
}

function pausePlay() {
  isPlaying = false;
  playCol = -1;
  document.getElementById('btnPlay').innerHTML = '&#9654; Play';
  document.getElementById('vinylRecord').classList.remove('playing');
  document.getElementById('vinylRecord').classList.remove('glow-pulse');
  document.getElementById('vinylRecord').classList.add('stopped');
  clearTimeouts();
  stopScheduledOscs();
  drawPianoRoll();
}

function stopPlay() {
  isPlaying = false;
  playCol = -1;
  glowActiveNotes = {};
  document.getElementById('btnPlay').innerHTML = '&#9654; Play';
  document.getElementById('vinylRecord').classList.remove('playing');
  document.getElementById('vinylRecord').classList.remove('glow-pulse');
  document.getElementById('vinylRecord').classList.remove('stopped');
  clearTimeouts();
  stopScheduledOscs();
  /* Clear particles */
  var pc = document.getElementById('particleContainer');
  pc.innerHTML = '';
  drawPianoRoll();
}

function stopScheduledOscs() {
  for (var i = 0; i < scheduledOscs.length; i++) {
    try { scheduledOscs[i].stop(0); } catch(e) {}
  }
  scheduledOscs = [];
}

function clearNotes() {
  stopPlay();
  currentSongIndex = -1;
  activeSongNotes = [];
  clearGrid();
  document.getElementById('nowPlaying').innerHTML = '';
  renderTrackList();
  drawPianoRoll();
}

function clearGrid() {
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) { noteGrid[r][c] = false; }
  }
}

function clearTimeouts() {
  for (var i = 0; i < playTimeouts.length; i++) { clearTimeout(playTimeouts[i]); }
  playTimeouts = [];
}

/* ═══════════════════════════════════════
   CONTROLS
   ═══════════════════════════════════════ */
function updateBPM(val) { bpm = parseInt(val, 10); document.getElementById('bpmVal').textContent = val; }
function updateVolume(val) {
  volume = parseInt(val, 10) / 100;
  document.getElementById('volVal').textContent = val;
  if (masterGain) masterGain.gain.value = volume;
}

document.getElementById('vinylContainer').addEventListener('click', function() {
  if (isPlaying) { pausePlay(); }
  else if (activeSongNotes.length > 0) { togglePlay(); }
  else if (songs.length > 0) { loadSong(0); }
});

/* ═══════════════════════════════════════
   SPECTRUM + WAVEFORM VISUALIZER
   ═══════════════════════════════════════ */
var spectrumBars = [];
var reflectionBars = [];
var spectrumRunning = false;
var waveformCanvas, waveformCtx;

function initSpectrum() {
  var barsContainer = document.getElementById('spectrumBarsContainer');
  var reflContainer = document.getElementById('spectrumReflection');
  var numBars = 48;
  for (var i = 0; i < numBars; i++) {
    var bar = document.createElement('div');
    bar.className = 'spectrum-bar';
    bar.style.height = '2px';
    var hue = 260 + (i / numBars) * 60;
    bar.style.background = 'linear-gradient(0deg, hsla(' + hue + ',80%,60%,1), hsla(' + (hue + 40) + ',80%,65%,1))';
    barsContainer.appendChild(bar);
    spectrumBars.push(bar);

    var rbar = document.createElement('div');
    rbar.className = 'spectrum-bar reflect';
    rbar.style.height = '2px';
    rbar.style.background = 'linear-gradient(0deg, hsla(' + hue + ',80%,60%,0.6), hsla(' + (hue + 40) + ',80%,65%,0.6))';
    reflContainer.appendChild(rbar);
    reflectionBars.push(rbar);
  }

  /* Waveform canvas */
  waveformCanvas = document.getElementById('waveformCanvas');
  waveformCtx = waveformCanvas.getContext('2d');
  resizeWaveform();
  window.addEventListener('resize', resizeWaveform);
}

function resizeWaveform() {
  if (!waveformCanvas) return;
  var parent = waveformCanvas.parentElement;
  waveformCanvas.width = parent.clientWidth - 32;
  waveformCanvas.height = parent.clientHeight - 20;
}

function startSpectrum() {
  if (spectrumRunning) return;
  spectrumRunning = true;
  var bufLen = analyser.frequencyBinCount;
  var freqData = new Uint8Array(bufLen);
  var timeData = new Uint8Array(bufLen);

  function update() {
    if (!analyser) { spectrumRunning = false; return; }
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);

    var step = Math.floor(bufLen / spectrumBars.length);
    for (var i = 0; i < spectrumBars.length; i++) {
      var val = freqData[i * step] || 0;
      var h = Math.max(2, (val / 255) * 70);
      spectrumBars[i].style.height = h + 'px';
      reflectionBars[i].style.height = (h * 0.4) + 'px';
    }

    /* Draw waveform */
    if (waveformCtx) {
      var wCtx = waveformCtx;
      var w = waveformCanvas.width;
      var h = waveformCanvas.height;
      wCtx.clearRect(0, 0, w, h);
      wCtx.lineWidth = 2;
      wCtx.strokeStyle = 'rgba(124,58,237,0.4)';
      wCtx.shadowColor = 'rgba(124,58,237,0.3)';
      wCtx.shadowBlur = 4;
      wCtx.beginPath();
      var sliceW = w / bufLen;
      for (var i = 0; i < bufLen; i++) {
        var v = timeData[i] / 128.0;
        var y = (v * h) / 2;
        if (i === 0) { wCtx.moveTo(0, y); }
        else { wCtx.lineTo(i * sliceW, y); }
      }
      wCtx.lineTo(w, h / 2);
      wCtx.stroke();
      wCtx.shadowBlur = 0;
    }

    requestAnimationFrame(update);
  }
  update();
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
renderTrackList();
initPianoRoll();
initSpectrum();
</script>
