<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" type="image/svg+xml" href="../icons/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evo Music — 自进化音乐引擎</title>
<meta property="og:title" content="Evo Music — 自进化音乐引擎">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121018;
  --bg-card: #1a1724;
  --bg-card-hover: #221e30;
  --indigo: #7c3aed;
  --indigo-dim: rgba(124,58,237,0.15);
  --indigo-glow: rgba(124,58,237,0.3);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,0.12);
  --text: #e8e0f0;
  --text-dim: #8b7fa8;
  --text-mid: #a99cc0;
  --groove: rgba(124,58,237,0.04);
  --border: rgba(124,58,237,0.1);
}

* { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior: smooth }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── Vinyl groove background pattern ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-radial-gradient(circle at 50% 40%, transparent 0px, transparent 3px, var(--groove) 3px, var(--groove) 4px),
    repeating-radial-gradient(circle at 50% 40%, transparent 0px, transparent 18px, rgba(124,58,237,0.02) 18px, rgba(124,58,237,0.02) 19px);
  background-size: 100% 100%;
  z-index: 0;
  pointer-events: none;
}

/* Ambient glows */
.ambient-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.ambient-glow.g1 { top: -15%; left: -10%; width: 600px; height: 600px; background: rgba(124,58,237,0.08); }
.ambient-glow.g2 { bottom: -10%; right: -8%; width: 500px; height: 500px; background: rgba(236,72,153,0.05); }
.ambient-glow.g3 { top: 30%; right: -15%; width: 350px; height: 350px; background: rgba(124,58,237,0.06); }

a { color: var(--indigo); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--pink); }

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(18,16,24,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 1rem; color: var(--text);
  letter-spacing: 0.02em;
}
.nav-brand em {
  font-style: normal;
  color: var(--indigo);
}
.nav-vinyl {
  width: 28px; height: 28px;
  border: 2px solid var(--indigo);
  border-radius: 50%;
  position: relative;
  animation: spin 4s linear infinite;
  opacity: 0.8;
}
.nav-vinyl::after {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid var(--indigo-glow);
  border-radius: 50%;
}
.nav-vinyl::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 5px; height: 5px;
  background: var(--pink);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--pink);
}
@keyframes spin { to { transform: rotate(360deg) } }

.nav-links {
  display: flex; gap: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.nav-links a { color: var(--text-dim); }
.nav-links a:hover { color: var(--text); }

/* ── HERO ── */
.hero {
  position: relative; z-index: 1;
  padding: 100px 20px 20px;
  display: flex; flex-direction: column; align-items: center;
  max-width: 640px; margin: 0 auto;
}

/* Giant vinyl record */
.vinyl-container {
  position: relative;
  width: clamp(240px, 55vw, 360px);
  height: clamp(240px, 55vw, 360px);
  margin-bottom: -60px;
  z-index: 2;
}
.vinyl-record {
  width: 100%; height: 100%;
  border-radius: 50%;
  background:
    radial-gradient(circle, var(--bg) 12%, transparent 12.5%),
    radial-gradient(circle, var(--bg) 12%, transparent 12.5%),
    conic-gradient(from 0deg, #1a1724, #201c2e, #1a1724, #221e30, #1a1724, #201c2e, #1a1724),
    radial-gradient(circle, transparent 22%, rgba(124,58,237,0.06) 22.5%, transparent 23%),
    radial-gradient(circle, transparent 28%, rgba(124,58,237,0.04) 28.3%, transparent 28.6%),
    radial-gradient(circle, transparent 34%, rgba(124,58,237,0.05) 34.3%, transparent 34.6%),
    radial-gradient(circle, transparent 40%, rgba(124,58,237,0.03) 40.3%, transparent 40.6%),
    radial-gradient(circle, transparent 46%, rgba(236,72,153,0.03) 46.3%, transparent 46.6%),
    radial-gradient(circle, transparent 52%, rgba(124,58,237,0.04) 52.3%, transparent 52.6%),
    radial-gradient(circle, transparent 58%, rgba(124,58,237,0.03) 58.3%, transparent 58.6%),
    radial-gradient(circle, transparent 64%, rgba(236,72,153,0.02) 64.3%, transparent 64.6%),
    radial-gradient(circle, transparent 70%, rgba(124,58,237,0.04) 70.3%, transparent 70.6%),
    radial-gradient(circle, transparent 76%, rgba(124,58,237,0.03) 76.3%, transparent 76.6%),
    radial-gradient(circle, transparent 82%, rgba(236,72,153,0.02) 82.3%, transparent 82.6%),
    radial-gradient(circle, transparent 88%, rgba(124,58,237,0.04) 88.3%, transparent 88.6%),
    radial-gradient(circle, #0e0c14 96%, #1a1724 100%);
  box-shadow:
    0 0 0 3px rgba(124,58,237,0.15),
    0 0 40px rgba(124,58,237,0.1),
    0 0 80px rgba(124,58,237,0.05),
    inset 0 0 30px rgba(0,0,0,0.5);
  animation: spin 8s linear infinite;
  position: relative;
}
.vinyl-label {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 38%; height: 38%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--indigo), #5b21b6);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
}
.vinyl-label-text {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(0.55rem, 2vw, 0.85rem);
  color: rgba(255,255,255,0.9);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.vinyl-label-text small {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.55em;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-top: 4px;
}
.vinyl-spindle {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 8px; height: 8px;
  background: #0e0c14;
  border-radius: 50%;
  z-index: 3;
  box-shadow: 0 0 0 2px rgba(236,72,153,0.4);
}

/* Hero text */
.hero-freq {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 80px;
  margin-bottom: 16px;
  text-align: center;
}
.hero h1 {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -0.01em;
  text-align: center;
}
.hero h1 .accent {
  color: var(--indigo);
}
.hero h1 .hot {
  color: var(--pink);
}
.hero-sub {
  font-size: 0.9rem;
  color: var(--text-dim);
  max-width: 360px;
  margin: 16px auto 0;
  text-align: center;
  line-height: 1.8;
}

/* ── STATS ── */
.stats-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin: 36px auto 0;
  max-width: 480px;
  padding: 0 20px;
  position: relative; z-index: 1;
}
.stat-badge {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg-card);
  position: relative;
  overflow: hidden;
}
.stat-badge::before {
  content: '';
  position: absolute; inset: 3px;
  border-radius: 50%;
  border: 1px solid rgba(124,58,237,0.06);
}
.stat-val {
  font-family: 'Archivo Black', sans-serif;
  font-size: 1.6rem;
  line-height: 1;
}
.stat-badge:nth-child(1) .stat-val { color: var(--indigo); }
.stat-badge:nth-child(2) .stat-val { color: var(--pink); }
.stat-badge:nth-child(3) .stat-val {
  background: linear-gradient(135deg, var(--indigo), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 6px;
}

/* ── MAIN ── */
.main {
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 20px 60px;
  position: relative; z-index: 1;
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ── TRACKLIST ── */
.track {
  margin-bottom: 36px;
  position: relative;
}
.track-inner {
  border-left: 2px solid var(--border);
  padding-left: 24px;
  margin-left: 16px;
  padding-bottom: 8px;
}

.track-hdr {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 0 12px 0;
  cursor: default;
  position: relative;
}
.track-num-circle {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Archivo Black', sans-serif;
  font-size: 0.7rem;
  color: var(--text-dim);
  flex-shrink: 0;
  position: absolute;
  left: -43px;
  top: -4px;
  background: var(--bg);
}
.track-inner:first-child .track-num-circle,
.track.active .track-num-circle {
  border-color: var(--indigo);
  color: var(--indigo);
  box-shadow: 0 0 12px var(--indigo-dim);
}
.track-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.01em;
  flex: 1;
  color: var(--text);
}
.track-eq {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 18px;
}
.eq-bar {
  width: 3px;
  border-radius: 2px;
  background: var(--indigo);
  animation: eq var(--d, 0.8s) ease-in-out infinite alternate;
}
@keyframes eq {
  0% { height: 3px; opacity: 0.4; }
  100% { height: var(--h, 16px); opacity: 1; }
}
.track.active .eq-bar { background: var(--pink); }

.track-desc {
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-bottom: 14px;
  line-height: 1.8;
  padding-left: 46px;
}

/* Sub tracks */
.sub-track {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 6px;
  transition: all 0.25s;
}
.sub-track:last-child { margin-bottom: 0; }
.sub-track:hover {
  background: var(--bg-card-hover);
  border-color: var(--indigo-glow);
}
.sub-track.active {
  border-color: var(--indigo);
  background: var(--indigo-dim);
  box-shadow: 0 0 20px var(--indigo-dim);
}

.st-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 2px solid var(--text-dim);
  flex-shrink: 0;
  transition: all 0.25s;
}
.st-dot.active {
  background: var(--pink);
  border-color: var(--pink);
  box-shadow: 0 0 8px rgba(236,72,153,0.4);
}
.st-text {
  font-size: 0.82rem;
  color: var(--text-mid);
  flex: 1;
  min-width: 0;
}
.sub-track.active .st-text {
  color: var(--text);
  font-weight: 500;
}
.st-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  flex-shrink: 0;
  padding: 3px 10px;
  border-radius: 20px;
}
.st-tag.active {
  color: var(--pink);
  border: 1px solid rgba(236,72,153,0.3);
  background: var(--pink-dim);
}
.st-tag.todo {
  color: var(--text-dim);
  border: 1px solid var(--border);
  background: transparent;
}

/* ── DEMO / VISUALIZER ── */
.demo {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--bg-card);
  margin-top: 8px;
}
.demo-hdr {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
}
.demo-play {
  width: 18px; height: 18px;
  border: 1.5px solid var(--indigo);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.demo-play::after {
  content: '';
  width: 0; height: 0;
  border-left: 5px solid var(--indigo);
  border-top: 3px solid transparent;
  border-bottom: 3px solid transparent;
  margin-left: 2px;
}
.demo-body {
  padding: 40px 20px;
  display: flex; align-items: center; justify-content: center;
  min-height: 140px;
  position: relative;
}
.demo-viz {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 70px;
}
.viz-bar {
  width: 3px;
  border-radius: 2px;
  background: linear-gradient(0deg, var(--indigo), rgba(124,58,237,0.08));
  animation: bounce var(--d, 1s) ease-in-out infinite alternate;
}
@keyframes bounce {
  0% { height: var(--min, 3px); }
  100% { height: var(--max, 30px); }
}
.demo-ph {
  text-align: center;
  color: var(--text-dim);
  position: absolute;
  font-size: 0.85rem;
  font-family: 'DM Sans', sans-serif;
}
.demo-ph span {
  display: block;
  font-size: 1.8em;
  margin-bottom: 8px;
  opacity: 0.5;
}

/* ── FOOTER ── */
.footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 48px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  border-top: 1px solid var(--border);
}
.footer .pink { color: var(--pink); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .nav { padding: 0 14px; height: 50px; }
  .nav-links { gap: 14px; font-size: 0.6rem; }
  .hero { padding-top: 80px; }
  .vinyl-container { width: clamp(200px, 60vw, 280px); height: clamp(200px, 60vw, 280px); margin-bottom: -50px; }
  .hero-freq { margin-top: 60px; }
  .stats-row { gap: 10px; flex-wrap: wrap; justify-content: center; }
  .stat-badge { width: 100px; height: 100px; }
  .stat-val { font-size: 1.3rem; }
  .st-tag { display: none; }
  .track-desc { padding-left: 0; }
  .track-num-circle { position: static; flex-shrink: 0; }
  .track-hdr { padding-left: 0; }
  .track-inner { margin-left: 0; padding-left: 0; border-left: none; }
}
@media (max-width: 400px) {
  body { font-size: 14px; }
  .hero h1 { font-size: 1.8rem; }
  .vinyl-container { width: 180px; height: 180px; margin-bottom: -40px; }
  .stats-row { padding: 0 10px; }
  .stat-badge { width: 90px; height: 90px; }
}
</style>
</head>
<body>

<div class="ambient-glow g1"></div>
<div class="ambient-glow g2"></div>
<div class="ambient-glow g3"></div>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-vinyl"></div>
    <span>EVO <em>MUSIC</em></span>
  </div>
  <div class="nav-links">
    <a href="/">home</a>
    <a href="/study/">lab</a>
    <a href="https://github.com/ArmyClaw/evo-music" target="_blank">github</a>
  </div>
</nav>

<section class="hero">
  <!-- Giant Vinyl -->
  <div class="vinyl-container">
    <div class="vinyl-record">
      <div class="vinyl-label">
        <div class="vinyl-label-text">
          evo<span class="hot" style="color:var(--pink)">•</span>music
          <small>self-evolving</small>
        </div>
      </div>
      <div class="vinyl-spindle"></div>
    </div>
  </div>

  <div class="hero-freq">project // 003</div>
  <h1>让音乐<br><span class="accent">自己进化</span></h1>
  <p class="hero-sub">从乐理基础到自主创作<br>马尔可夫链 + 遗传算法</p>
</section>

<!-- Circular stats -->
<div class="stats-row">
  <div class="stat-badge">
    <div class="stat-val" id="devDay">0</div>
    <div class="stat-label">Days</div>
  </div>
  <div class="stat-badge">
    <div class="stat-val">5</div>
    <div class="stat-label">Tracks</div>
  </div>
  <div class="stat-badge">
    <div class="stat-val">∞</div>
    <div class="stat-label">Generations</div>
  </div>
</div>

<div class="main">
  <div class="section-label">// Development Tracklist</div>

  <div id="roadmap"></div>

  <!-- Audio visualizer -->
  <div class="demo">
    <div class="demo-hdr">
      <div class="demo-play"></div>
      audio output
    </div>
    <div class="demo-body">
      <div class="demo-viz" id="visualizer"></div>
      <div class="demo-ph">
        <span>🎵</span>
        音频引擎即将上线
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  evo-music · by <span class="pink">阿呆</span>
</footer>

<script>
// Dev days counter
document.getElementById('devDay').textContent = Math.max(0, Math.floor((Date.now() - new Date('2026-06-17')) / 86400000));

// Audio visualizer bars
const viz = document.getElementById('visualizer');
if (viz) {
  for (let i = 0; i < 48; i++) {
    const b = document.createElement('div');
    b.className = 'viz-bar';
    b.style.setProperty('--d', (0.6 + Math.random() * 1.4) + 's');
    b.style.setProperty('--min', (2 + Math.random() * 4) + 'px');
    b.style.setProperty('--max', (8 + Math.random() * 28) + 'px');
    b.style.animationDelay = (Math.random() * 2) + 's';
    viz.appendChild(b);
  }
}
(async()=>{
  const projKey='evo-music';
  try{
    const r=await fetch('/data/lab-progress.json');
    const d=await r.json();
    const p=d.projects.find(x=>x.name===projKey);if(!p)return;
    const pct=Math.round(p.progress);
    const done=[];p.phases.forEach(ph=>{ph.tasks.forEach(t=>{if(t.status==='completed')done.push(t.title)})});
    const recent=done.slice(-3).reverse();
    // ── Dynamic roadmap ──
    const roadmap=document.getElementById('roadmap');
    // update Tracks stat
    const tracksStat=[...document.querySelectorAll('.stat-val')].find(el=>el.parentElement.querySelector('.stat-label')?.textContent==='Tracks');
    if(tracksStat)tracksStat.textContent=p.phases.length;
    if(roadmap){
      // order phases by logic: 音乐理论 first, then 旋律→编曲→进化
      const phaseOrder=['乐理基础','旋律生成','编曲引擎','进化机制'];
      const sorted=[...p.phases].sort((a,b)=>{
        const ia=phaseOrder.indexOf(a.name),ib=phaseOrder.indexOf(b.name);
        return (ia===-1?99:ia)-(ib===-1?99:ib);
      });
      // find first phase with a pending (not all-done) task → that's "active"
      let activePhaseIdx=sorted.findIndex(ph=>ph.done<ph.total);
      if(activePhaseIdx===-1) activePhaseIdx=0;
      // find first pending task in active phase
      const activeTasks=[];
      sorted[activePhaseIdx].tasks.forEach(t=>{if(t.status!=='completed')activeTasks.push(t)});
      const activeTaskSet=new Set(activeTasks.map(t=>t.title));
      sorted.forEach((ph,idx)=>{
        const num=String(idx+1).padStart(2,'0');
        const isActive=idx===activePhaseIdx;
        const pct=Math.round(ph.done/ph.total*100);
        // random EQ bars (more bars for active)
        const barCount=isActive?5:Math.max(2,Math.round(ph.done/ph.total*5)+1);
        let eqHTML='<div class="track-eq">';
        for(let b=0;b<barCount;b++){
          const d=(0.4+Math.random()*1.3).toFixed(1);
          const h=Math.round(4+Math.random()*14);
          eqHTML+='<div class="eq-bar" style="--d:'+d+'s;--h:'+h+'px"></div>';
        }
        eqHTML+='</div>';
        // progress micro bar
        const microBar='<div style="width:60px;height:3px;background:rgba(124,58,237,0.12);border-radius:2px;overflow:hidden;flex-shrink:0"><div style="height:100%;width:'+pct+'%;background:'+(ph.done>0?'var(--indigo)':'var(--border)')+';border-radius:2px;transition:width 0.5s"></div></div>';
        let trackHTML='<div class="track'+(isActive?' active':'')+'"><div class="track-inner"><div class="track-hdr"><div class="track-num-circle">'+num+'</div><div class="track-title">'+ph.name+'</div>'+eqHTML+microBar+'<span style="font-family:DM Mono,monospace;font-size:0.6rem;color:var(--text-dim)">'+ph.done+'/'+ph.total+'</span></div>';
        ph.tasks.forEach(task=>{
          const isCompleted=task.status==='completed';
          const isCurrent=isActive&&activeTaskSet.has(task.title)&&!isCompleted;
          let cls='sub-track';
          if(isCurrent)cls+=' active';
          let dotCls='st-dot';
          if(isCompleted)dotCls+=' active';
          else if(isCurrent)dotCls+=' active';
          // clean title: remove prefix like "Design: " for display
          const label=task.title.replace(/^(Design|Spec|Implement|Test)\s*:\s*/,'');
          const prefix=task.title.match(/^(Design|Spec|Implement|Test)\s*:/)?.[1]||'';
          let tagHTML='';
          if(isCompleted) tagHTML='<span class="st-tag active">✓ done</span>';
          else if(isCurrent) tagHTML='<span class="st-tag active">building</span>';
          else tagHTML='<span class="st-tag todo">planned</span>';
          trackHTML+='<div class="'+cls+'"><div class="'+dotCls+'"></div>';
          if(prefix){
            trackHTML+='<span style="font-family:DM Mono,monospace;font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;color:'+(isCompleted?'var(--indigo)':'var(--text-dim)')+';flex-shrink:0;min-width:52px">'+prefix+'</span>';
          }
          trackHTML+='<div class="st-text">'+(isCompleted?'<span style="color:var(--indigo)">✓ </span>':'')+label+'</div>'+tagHTML+'</div>';
        });
        trackHTML+='</div></div>';
        roadmap.insertAdjacentHTML('beforeend',trackHTML);
      });
    }
    // ── Banner ──
    const banner=document.createElement('div');
    banner.id='lab-progress-bar';
    banner.style.cssText='position:relative;z-index:50;padding-top:56px;padding:8px 20px 20px;background:rgba(124,58,237,0.1);border-bottom:1px solid rgba(124,58,237,0.15);font-family:DM Mono,monospace;font-size:11px;letter-spacing:0.05em;color:#c4b5fd;display:flex;align-items:center;gap:12px;flex-wrap:wrap';
    let recentHTML=recent.length?recent.map(t=>'<span style="color:#a78bfa">✓ '+t+'</span>').join(' · '):'';
    banner.innerHTML='<span style="font-weight:600;color:#a78bfa">'+pct+'%</span><div style="flex:1;min-width:80px;height:3px;background:rgba(124,58,237,0.15);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:#7c3aed;border-radius:2px;transition:width 0.6s"></div></div><span>'+p.done+'/'+p.total+'</span>'+(recentHTML?'<span style="margin-left:auto;font-size:10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+recentHTML+'</span>':'');
    document.body.prepend(banner);
  }catch(e){}
})();
</script>
</body>
</html>
