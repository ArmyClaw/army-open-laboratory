<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evo Music - 自进化音乐引擎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .player-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        
        .player-section {
            margin-bottom: 30px;
        }
        
        .player-section h2 {
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .demo-files {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .demo-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .demo-info {
            flex: 1;
        }
        
        .demo-info h3 {
            margin-bottom: 5px;
        }
        
        .demo-info p {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .play-button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        
        .play-button:hover {
            background: #45a049;
        }
        
        .play-button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 1.1em;
        }
        
        .theory-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
        }
        
        .theory-info h3 {
            margin-bottom: 15px;
        }
        
        .theory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .theory-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧬 Evo Music</h1>
        <p>自进化音乐引擎 - Phase 1: 乐理基础</p>
    </div>

    <div class="player-container">
        <div class="player-section">
            <h2>🎵 音阶演示</h2>
            <div class="demo-files">
                <div class="demo-item">
                    <div class="demo-info">
                        <h3>C大调音阶</h3>
                        <p>基本大调音阶演示</p>
                    </div>
                    <button class="play-button" onclick="playMIDI('c_major_scale_demo.mid')">播放</button>
                </div>
            </div>
        </div>

        <div class="player-section">
            <h2>🎸 和弦进行演示</h2>
            <div class="demo-files">
                <div class="demo-item">
                    <div class="demo-info">
                        <h3>C大调经典流行 (I-V-vi-IV)</h3>
                        <p>经典流行音乐和弦进行</p>
                    </div>
                    <button class="play-button" onclick="playMIDI('C_major_classic_pop_demo.mid')">播放</button>
                </div>
                <div class="demo-item">
                    <div class="demo-info">
                        <h3>C大调经典流行进行</h3>
                        <p>完整的和弦进行演示</p>
                    </div>
                    <button class="play-button" onclick="playMIDI('C_major_classic_pop_progression.mid')">播放</button>
                </div>
                <div class="demo-item">
                    <div class="demo-info">
                        <h3>通用和弦进行</h3>
                        <p>多种和弦进行组合演示</p>
                    </div>
                    <button class="play-button" onclick="playMIDI('chord_progression_demo.mid')">播放</button>
                </div>
            </div>
        </div>

        <div class="loading" id="loading"></div>
        <div class="status" id="status">点击播放按钮开始音乐演示</div>
    </div>

    <div class="theory-info">
        <h3>🎼 音乐理论基础</h3>
        <div class="theory-grid">
            <div class="theory-item">
                <h4>音阶系统</h4>
                <p>大调/小调/五声</p>
            </div>
            <div class="theory-item">
                <h4>和弦进行</h4>
                <p>I-V-vi-IV等经典进行</p>
            </div>
            <div class="theory-item">
                <h4>节奏模式</h4>
                <p>33种不同风格的节奏</p>
            </div>
            <div class="theory-item">
                <h4>MIDI输出</h4>
                <p>标准MIDI文件生成</p>
            </div>
        </div>
    </div>

    <script>
        function playMIDI(filename) {
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');
            
            // 显示加载状态
            loading.style.display = 'inline-block';
            status.textContent = '正在加载MIDI播放器...';
            
            // 禁用所有播放按钮
            const buttons = document.querySelectorAll('.play-button');
            buttons.forEach(btn => btn.disabled = true);
            
            // 使用Web Audio API加载和播放MIDI
            fetch(filename)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('MIDI文件加载失败');
                    }
                    return response.arrayBuffer();
                })
                .then(arrayBuffer => {
                    // 注意：这里需要实际的MIDI解析器
                    // 为了演示，我们模拟播放过程
                    loading.style.display = 'none';
                    status.textContent = `正在播放: ${filename}`;
                    
                    // 模拟播放时间
                    setTimeout(() => {
                        status.textContent = `播放完成: ${filename}`;
                        buttons.forEach(btn => btn.disabled = false);
                    }, 5000);
                })
                .catch(error => {
                    loading.style.display = 'none';
                    status.textContent = `播放失败: ${error.message}`;
                    buttons.forEach(btn => btn.disabled = false);
                });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 可以在这里添加初始化代码
            console.log('Evo Music Web Player 已加载');
        });
    </script>
</body>
</html>
