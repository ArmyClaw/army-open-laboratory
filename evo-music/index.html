<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evo Music — 在线音乐播放器</title>
<meta property="og:title" content="Evo Music — 在线音乐播放器">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121018;
  --bg-card: #1a1724;
  --bg-card-hover: #221e30;
  --indigo: #7c3aed;
  --indigo-dim: rgba(124,58,237,0.15);
  --indigo-glow: rgba(124,58,237,0.3);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,0.12);
  --text: #e8e0f0;
  --text-dim: #8b7fa8;
  --text-mid: #a99cc0;
  --groove: rgba(124,58,237,0.04);
  --border: rgba(124,58,237,0.1);
}
* { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior: smooth }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-radial-gradient(circle at 50% 40%, transparent 0px, transparent 3px, var(--groove) 3px, var(--groove) 4px),
    repeating-radial-gradient(circle at 50% 40%, transparent 0px, transparent 18px, rgba(124,58,237,0.02) 18px, rgba(124,58,237,0.02) 19px);
  background-size: 100% 100%;
  z-index: 0;
  pointer-events: none;
}
.ambient-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.ambient-glow.g1 { top: -15%; left: -10%; width: 600px; height: 600px; background: rgba(124,58,237,0.08); }
.ambient-glow.g2 { bottom: -10%; right: -8%; width: 500px; height: 500px; background: rgba(236,72,153,0.05); }
.ambient-glow.g3 { top: 30%; right: -15%; width: 350px; height: 350px; background: rgba(124,58,237,0.06); }
a { color: var(--indigo); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--pink); }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(18,16,24,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 1rem; color: var(--text);
  letter-spacing: 0.02em;
}
.nav-brand em { font-style: normal; color: var(--indigo); }
.nav-vinyl {
  width: 28px; height: 28px;
  border: 2px solid var(--indigo);
  border-radius: 50%;
  position: relative;
  animation: spin 4s linear infinite;
  opacity: 0.8;
}
.nav-vinyl::after {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid var(--indigo-glow);
  border-radius: 50%;
}
.nav-vinyl::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 5px; height: 5px;
  background: var(--pink);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--pink);
}
@keyframes spin { to { transform: rotate(360deg) } }
.nav-links {
  display: flex; gap: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.nav-links a { color: var(--text-dim); }
.nav-links a:hover { color: var(--text); }

/* HERO */
.hero {
  position: relative; z-index: 1;
  padding: 80px 20px 10px;
  display: flex; flex-direction: column; align-items: center;
  max-width: 640px; margin: 0 auto;
}
.vinyl-container {
  position: relative;
  width: clamp(180px, 40vw, 280px);
  height: clamp(180px, 40vw, 280px);
  margin-bottom: -40px;
  z-index: 2;
  cursor: pointer;
  transition: filter 0.3s;
}
.vinyl-container:hover { filter: brightness(1.1); }
.vinyl-record {
  width: 100%; height: 100%;
  border-radius: 50%;
  background:
    radial-gradient(circle, var(--bg) 12%, transparent 12.5%),
    conic-gradient(from 0deg, #1a1724, #201c2e, #1a1724, #221e30, #1a1724, #201c2e, #1a1724),
    radial-gradient(circle, transparent 22%, rgba(124,58,237,0.06) 22.5%, transparent 23%),
    radial-gradient(circle, transparent 28%, rgba(124,58,237,0.04) 28.3%, transparent 28.6%),
    radial-gradient(circle, transparent 34%, rgba(124,58,237,0.05) 34.3%, transparent 34.6%),
    radial-gradient(circle, transparent 40%, rgba(124,58,237,0.03) 40.3%, transparent 40.6%),
    radial-gradient(circle, transparent 46%, rgba(236,72,153,0.03) 46.3%, transparent 46.6%),
    radial-gradient(circle, transparent 52%, rgba(124,58,237,0.04) 52.3%, transparent 52.6%),
    radial-gradient(circle, transparent 58%, rgba(124,58,237,0.03) 58.3%, transparent 58.6%),
    radial-gradient(circle, transparent 64%, rgba(236,72,153,0.02) 64.3%, transparent 64.6%),
    radial-gradient(circle, transparent 70%, rgba(124,58,237,0.04) 70.3%, transparent 70.6%),
    radial-gradient(circle, transparent 76%, rgba(124,58,237,0.03) 76.3%, transparent 76.6%),
    radial-gradient(circle, transparent 82%, rgba(236,72,153,0.02) 82.3%, transparent 82.6%),
    radial-gradient(circle, transparent 88%, rgba(124,58,237,0.04) 88.3%, transparent 88.6%),
    radial-gradient(circle, #0e0c14 96%, #1a1724 100%);
  box-shadow:
    0 0 0 3px rgba(124,58,237,0.15),
    0 0 40px rgba(124,58,237,0.1),
    0 0 80px rgba(124,58,237,0.05),
    inset 0 0 30px rgba(0,0,0,0.5);
  animation: spin 8s linear infinite;
  position: relative;
  transition: animation-duration 0.5s;
}
.vinyl-record.playing { animation-duration: 2s; }
.vinyl-record.stopped { animation-play-state: paused; }
.vinyl-label {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 38%; height: 38%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--indigo), #5b21b6);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
}
.vinyl-label-text {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(0.5rem, 2vw, 0.75rem);
  color: rgba(255,255,255,0.9);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.vinyl-label-text small {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.55em;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-top: 4px;
}
.vinyl-spindle {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 8px; height: 8px;
  background: #0e0c14;
  border-radius: 50%;
  z-index: 3;
  box-shadow: 0 0 0 2px rgba(236,72,153,0.4);
}
.hero-freq {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 60px;
  margin-bottom: 8px;
  text-align: center;
}
.hero h1 {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -0.01em;
  text-align: center;
}
.hero h1 .accent { color: var(--indigo); }
.hero h1 .hot { color: var(--pink); }
#nowPlaying {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--indigo);
  text-align: center;
  margin-top: 8px;
  min-height: 1.2em;
}

/* MAIN */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 60px;
  position: relative; z-index: 1;
}
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* TRACK LIST */
.track-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  margin-bottom: 30px;
}
.track-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
}
.track-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--indigo-glow);
  transform: translateY(-1px);
}
.track-card.active {
  border-color: var(--indigo);
  background: var(--indigo-dim);
  box-shadow: 0 0 20px var(--indigo-dim);
}
.track-play-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--indigo);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  color: var(--indigo);
}
.track-card.active .track-play-btn {
  background: var(--indigo);
  color: #fff;
}
.track-play-btn svg { width: 14px; height: 14px; fill: currentColor; }
.track-info { flex: 1; min-width: 0; }
.track-name {
  font-family: 'Archivo Black', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.2;
}
.track-card.active .track-name { color: var(--pink); }
.track-artist {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* CONTROLS */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.ctrl-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctrl-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
}
.ctrl-val {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--indigo);
  min-width: 32px;
  text-align: right;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--indigo);
  cursor: pointer;
  box-shadow: 0 0 8px var(--indigo-glow);
}
select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  outline: none;
  cursor: pointer;
}
select:focus { border-color: var(--indigo); }
.btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-card);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--indigo); background: var(--indigo-dim); }
.btn.active { border-color: var(--indigo); background: var(--indigo); color: #fff; }
.btn.pink { border-color: var(--pink); color: var(--pink); }
.btn.pink:hover { background: var(--pink-dim); }
.btn.danger { border-color: #ef4444; color: #ef4444; }
.btn.danger:hover { background: rgba(239,68,68,0.1); }

/* PIANO ROLL */
.piano-roll-wrap {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--bg-card);
  margin-bottom: 20px;
}
.piano-roll-hdr {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.piano-roll-canvas-wrap {
  position: relative;
  overflow-x: auto;
  overflow-y: hidden;
  background: #0d0b12;
}
.piano-roll-canvas-wrap canvas {
  display: block;
  cursor: crosshair;
}

/* SPECTRUM */
.spectrum-wrap {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--bg-card);
}
.spectrum-hdr {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
}
.spectrum-body {
  padding: 20px 16px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  height: 100px;
  gap: 2px;
}
.spectrum-bar {
  width: 4px;
  min-height: 2px;
  border-radius: 2px;
  background: linear-gradient(0deg, var(--indigo), var(--pink));
  transition: height 0.05s linear;
}

/* FOOTER */
.footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 36px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  text-transform: uppercase;
  border-top: 1px solid var(--border);
}
.footer .pink { color: var(--pink); }

/* MOBILE */
@media (max-width: 768px) {
  .nav { padding: 0 14px; height: 50px; }
  .nav-links { gap: 14px; font-size: 0.6rem; }
  .hero { padding-top: 70px; }
  .vinyl-container { width: clamp(150px, 45vw, 200px); height: clamp(150px, 45vw, 200px); margin-bottom: -30px; }
  .hero-freq { margin-top: 50px; }
  .track-list { grid-template-columns: 1fr; }
  .controls { gap: 8px; padding: 10px 12px; }
  input[type="range"] { width: 70px; }
}
@media (max-width: 400px) {
  body { font-size: 14px; }
  .hero h1 { font-size: 1.5rem; }
  .controls { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="ambient-glow g1"></div>
<div class="ambient-glow g2"></div>
<div class="ambient-glow g3"></div>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-vinyl"></div>
    <span>EVO <em>MUSIC</em></span>
  </div>
  <div class="nav-links">
    <a href="/">home</a>
    <a href="/study/">lab</a>
    <a href="https://github.com/ArmyClaw/evo-music" target="_blank">github</a>
  </div>
</nav>

<section class="hero">
  <div class="vinyl-container" id="vinylContainer" title="点击播放/暂停">
    <div class="vinyl-record" id="vinylRecord">
      <div class="vinyl-label">
        <div class="vinyl-label-text">
          evo<span class="hot" style="color:var(--pink)">&#8226;</span>music
          <small>player</small>
        </div>
      </div>
      <div class="vinyl-spindle"></div>
    </div>
  </div>
  <div class="hero-freq">online music player</div>
  <h1>Web Audio <span class="accent">合成器</span></h1>
  <div id="nowPlaying"></div>
</section>

<div class="main">
  <div class="section-label">// 曲库 Presets</div>
  <div class="track-list" id="trackList"></div>

  <div class="section-label">// 控制面板</div>
  <div class="controls">
    <button class="btn" id="btnPlay" onclick="togglePlay()">&#9654; Play</button>
    <button class="btn" id="btnStop" onclick="stopPlay()">&#9632; Stop</button>
    <button class="btn danger" onclick="clearNotes()">Clear</button>
    <div class="ctrl-group">
      <span class="ctrl-label">BPM</span>
      <input type="range" id="bpmSlider" min="60" max="200" value="120" oninput="updateBPM(this.value)">
      <span class="ctrl-val" id="bpmVal">120</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Wave</span>
      <select id="waveSelect" onchange="currentWave=this.value">
        <option value="sine">Sine</option>
        <option value="square">Square</option>
        <option value="sawtooth">Sawtooth</option>
        <option value="triangle">Triangle</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Scale</span>
      <select id="scaleSelect" onchange="currentScale=this.value;drawPianoRoll()">
        <option value="major">C Major</option>
        <option value="minor">A Minor</option>
        <option value="pentatonic">Pentatonic</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Vol</span>
      <input type="range" id="volSlider" min="0" max="100" value="50" oninput="updateVolume(this.value)">
      <span class="ctrl-val" id="volVal">50</span>
    </div>
  </div>

  <div class="section-label">// 钢琴卷帘 Piano Roll</div>
  <div class="piano-roll-wrap">
    <div class="piano-roll-hdr">
      <span>piano roll editor</span>
      <span style="color:var(--text-dim);font-size:0.5rem">click to add/remove notes</span>
    </div>
    <div class="piano-roll-canvas-wrap" id="pianoRollWrap">
      <canvas id="pianoRollCanvas"></canvas>
    </div>
  </div>

  <div class="section-label">// 实时频谱 Spectrum</div>
  <div class="spectrum-wrap">
    <div class="spectrum-hdr">
      <span>&#9835;</span> real-time frequency spectrum
    </div>
    <div class="spectrum-body" id="spectrumBody"></div>
  </div>
</div>

<footer class="footer">
  evo-music &middot; by <span class="pink">阿呆</span> &middot; web audio api
</footer>

<script>
/* ═══════════════════════════════════════
   CONSTANTS & STATE
   ═══════════════════════════════════════ */
var audioCtx = null;
var analyser = null;
var masterGain = null;
var currentWave = 'sine';
var currentScale = 'major';
var bpm = 120;
var volume = 0.5;
var isPlaying = false;
var playTimeouts = [];
var currentSongIndex = -1;
var activeSongNotes = [];

/* Scale definitions: MIDI note offsets from C4(60) */
var scales = {
  major: [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 17, 19, 21, 23],
  minor: [0, 2, 3, 5, 7, 8, 10, 12, 14, 15, 17, 19, 20, 22],
  pentatonic: [0, 2, 4, 7, 9, 12, 14, 16, 19, 21]
};

/* Piano roll grid dimensions */
var ROWS = 16;
var COLS = 32;
var CELL_W = 28;
var CELL_H = 22;
var LABEL_W = 36;

/* Note grid for piano roll editing */
var noteGrid = [];
for (var r = 0; r < ROWS; r++) {
  noteGrid[r] = [];
  for (var c = 0; c < COLS; c++) {
    noteGrid[r][c] = false;
  }
}

/* Playback position */
var playCol = -1;

/* MIDI to frequency */
function midiToFreq(n) {
  return 440 * Math.pow(2, (n - 69) / 12);
}

/* ═══════════════════════════════════════
   AUDIO INIT (lazy, on first user gesture)
   ═══════════════════════════════════════ */
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = volume;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
  startSpectrum();
}

/* Play a single note */
function playNote(freq, startTime, duration) {
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = currentWave;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0.3, startTime);
  gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration * 0.9);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

/* ═══════════════════════════════════════
   SONGS DATA
   ═══════════════════════════════════════ */
var songs = [];

/* Note helper: {n: midi, t: beat (0-based), d: beats duration} */
function N(midi, beat, dur) { return {n: midi, t: beat, d: dur}; }

/* 1. 小星星 Twinkle Twinkle */
(function() {
  var c=60,d=62,e=64,f=65,g=67,a=69;
  var melody = [
    N(c,0,1),N(c,1,1),N(g,2,1),N(g,3,1),

   TRACK LIST UI
   ═══════════════════════════════════════ */
function renderTrackList() {
  var container = document.getElementById('trackList');
  var html = '';
  for (var i = 0; i < songs.length; i++) {
    var s = songs[i];
    var activeClass = (i === currentSongIndex) ? ' active' : '';
    html += '<div class="track-card' + activeClass + '" onclick="loadSong(' + i + ')" data-idx="' + i + '">';
    html += '<div class="track-play-btn"><svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"></polygon></svg></div>';
    html += '<div class="track-info"><div class="track-name">' + s.name + '</div>';
    html += '<div class="track-artist">' + s.artist + '</div></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

/* ═══════════════════════════════════════
   LOAD SONG TO PIANO ROLL + PLAY
   ═══════════════════════════════════════ */
function loadSong(idx) {
  initAudio();
  stopPlay();
  currentSongIndex = idx;
  activeSongNotes = songs[idx].notes.slice();

  /* Clear grid and place notes */
  clearGrid();
  var scaleNotes = scales[currentScale];
  for (var i = 0; i < activeSongNotes.length; i++) {
    var note = activeSongNotes[i];
    /* Find row: map midi to row index (highest note = row 0) */
    var row = midiToRow(note.n);
    if (row >= 0 && row < ROWS) {
      var col = Math.floor(note.t);
      if (col >= 0 && col < COLS) {
        noteGrid[row][col] = true;
      }
    }
  }

  renderTrackList();
  drawPianoRoll();
  document.getElementById('nowPlaying').innerHTML = '&#9835; ' + songs[idx].name + ' — ' + songs[idx].artist;
  togglePlay();
}

/* Map MIDI note to piano roll row */
function midiToRow(midi) {
  var scaleNotes = scales[currentScale];
  /* Row 0 = highest note in scale range */
  var baseMidi = 60; /* C4 */
  for (var r = ROWS - 1; r >= 0; r--) {
    var noteMidi = baseMidi + scaleNotes[r % scaleNotes.length] + Math.floor(r / scaleNotes.length) * 12;
    /* Simpler: just invert */
  }
  /* Simple approach: row 0 = top = highest pitch */
  /* Map midi 48-83 (C3 to B5) to rows 15-0 */
  return ROWS - 1 - Math.max(0, Math.min(ROWS - 1, midi - 48));
}

function rowToMidi(row) {
  return 48 + (ROWS - 1 - row);
}

/* ═══════════════════════════════════════
   PIANO ROLL DRAWING (Canvas)
   ═══════════════════════════════════════ */
var pianoCanvas, pianoCtx;

/* roundRect polyfill */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r,r,r,r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
    return this;
  };
}

function initPianoRoll() {
  pianoCanvas = document.getElementById('pianoRollCanvas');
  pianoCtx = pianoCanvas.getContext('2d');
  resizePianoRoll();
  drawPianoRoll();
  pianoCanvas.addEventListener('click', onPianoRollClick);
  window.addEventListener('resize', function() {
    resizePianoRoll();
    drawPianoRoll();
  });
}

function resizePianoRoll() {
  var wrap = document.getElementById('pianoRollWrap');
  var wrapW = wrap.clientWidth;
  var totalW = LABEL_W + COLS * CELL_W;
  pianoCanvas.width = Math.max(totalW, wrapW);
  pianoCanvas.height = ROWS * CELL_H;
  pianoCanvas.style.width = Math.max(totalW, wrapW) + 'px';
  pianoCanvas.style.height = (ROWS * CELL_H) + 'px';
}

function drawPianoRoll() {
  if (!pianoCtx) return;
  var ctx = pianoCtx;
  var w = pianoCanvas.width;
  var h = pianoCanvas.height;
  ctx.clearRect(0, 0, w, h);

  /* Draw grid lines */
  ctx.strokeStyle = 'rgba(124,58,237,0.08)';
  ctx.lineWidth = 1;
  for (var c = 0; c <= COLS; c++) {
    var x = LABEL_W + c * CELL_W;
    ctx.beginPath();
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, h);
    ctx.stroke();
  }
  for (var r = 0; r <= ROWS; r++) {
    var y = r * CELL_H;
    ctx.beginPath();
    ctx.moveTo(LABEL_W, y + 0.5);
    ctx.lineTo(w, y + 0.5);
    ctx.stroke();
  }

  /* Draw note labels on left */
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  var noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  for (var r = 0; r < ROWS; r++) {
    var midi = rowToMidi(r);
    var name = noteNames[midi % 12] + Math.floor(midi / 12 - 1);
    /* Highlight black keys row */
    var isBlack = [1,3,6,8,10].indexOf(midi % 12) >= 0;
    if (isBlack) {
      ctx.fillStyle = 'rgba(124,58,237,0.06)';
      ctx.fillRect(0, r * CELL_H, LABEL_W, CELL_H);
      ctx.fillRect(LABEL_W, r * CELL_H, w - LABEL_W, CELL_H);
    }
    ctx.fillStyle = isBlack ? '#6b5f80' : '#8b7fa8';
    ctx.fillText(name, LABEL_W - 4, r * CELL_H + CELL_H / 2);
  }

  /* Draw separator line */
  ctx.strokeStyle = 'rgba(124,58,237,0.2)';
  ctx.beginPath();
  ctx.moveTo(LABEL_W + 0.5, 0);
  ctx.lineTo(LABEL_W + 0.5, h);
  ctx.stroke();

  /* Draw notes */
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (noteGrid[r][c]) {
        var x = LABEL_W + c * CELL_W + 1;
        var y = r * CELL_H + 1;
        var nw = CELL_W - 2;
        var nh = CELL_H - 2;

        /* Gradient based on column position */
        var hue = 260 + (c / COLS) * 60; /* indigo to pink */
        ctx.fillStyle = 'hsla(' + hue + ', 80%, 60%, 0.85)';
        ctx.beginPath();
        ctx.roundRect(x, y, nw, nh, 3);
        ctx.fill();

        /* Glow */
        ctx.shadowColor = 'hsla(' + hue + ', 80%, 60%, 0.4)';
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  /* Draw playhead */
  if (playCol >= 0 && playCol < COLS) {
    var px = LABEL_W + playCol * CELL_W;
    ctx.fillStyle = 'rgba(236,72,153,0.15)';
    ctx.fillRect(px, 0, CELL_W, h);
    ctx.strokeStyle = 'rgba(236,72,153,0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, h);
    ctx.stroke();
  }
}

/* Handle click on piano roll */
function onPianoRollClick(e) {
  var rect = pianoCanvas.getBoundingClientRect();
  var scaleX = pianoCanvas.width / rect.width;
  var scaleY = pianoCanvas.height / rect.height;
  var mx = (e.clientX - rect.left) * scaleX;
  var my = (e.clientY - rect.top) * scaleY;

  var col = Math.floor((mx - LABEL_W) / CELL_W);
  var row = Math.floor(my / CELL_H);

  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  noteGrid[row][col] = !noteGrid[row][col];

  /* If user edits, clear active song association */
  if (noteGrid[row][col]) {
    activeSongNotes.push({n: rowToMidi(row), t: col, d: 1});
  } else {
    for (var i = activeSongNotes.length - 1; i >= 0; i--) {
      if (activeSongNotes[i].n === rowToMidi(row) && Math.floor(activeSongNotes[i].t) === col) {
        activeSongNotes.splice(i, 1);
        break;
      }
    }
  }

  drawPianoRoll();
}

/* ═══════════════════════════════════════
   PLAYBACK ENGINE
   ═══════════════════════════════════════ */
function togglePlay() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (isPlaying) {
    pausePlay();
    return;
  }

  if (activeSongNotes.length === 0) return;

  isPlaying = true;
  document.getElementById('btnPlay').innerHTML = '&#10074;&#10074; Pause';
  document.getElementById('vinylRecord').classList.add('playing');
  document.getElementById('vinylRecord').classList.remove('stopped');

  /* Find max beat to know total length */
  var maxBeat = 0;
  for (var i = 0; i < activeSongNotes.length; i++) {
    var endBeat = activeSongNotes[i].t + activeSongNotes[i].d;
    if (endBeat > maxBeat) maxBeat = endBeat;
  }
  var totalBeats = Math.ceil(maxBeat) + 1;

  /* Schedule all notes using Web Audio scheduling */
  var beatDur = 60 / bpm;
  var startTime = audioCtx.currentTime + 0.05;

  for (var i = 0; i < activeSongNotes.length; i++) {
    var note = activeSongNotes[i];
    var t = startTime + note.t * beatDur;
    var d = Math.max(0.1, note.d * beatDur);
    playNote(midiToFreq(note.n), t, d);
  }

  /* Animate playhead */
  var startT = performance.now();
  var totalDurMs = totalBeats * beatDur * 1000;

  function animate() {
    if (!isPlaying) return;
    var elapsed = performance.now() - startT;
    var currentBeat = elapsed / (beatDur * 1000);
    playCol = Math.floor(currentBeat);
    drawPianoRoll();
    if (playCol < COLS && elapsed < totalDurMs) {
      requestAnimationFrame(animate);
    } else {
      stopPlay();
    }
  }
  requestAnimationFrame(animate);

  /* Auto-stop after song ends */
  var autoStop = setTimeout(function() {
    if (isPlaying) stopPlay();
  }, totalDurMs + 200);
  playTimeouts.push(autoStop);
}

function pausePlay() {
  isPlaying = false;
  playCol = -1;
  document.getElementById('btnPlay').innerHTML = '&#9654; Play';
  document.getElementById('vinylRecord').classList.remove('playing');
  document.getElementById('vinylRecord').classList.add('stopped');
  clearTimeouts();
  drawPianoRoll();
}

function stopPlay() {
  isPlaying = false;
  playCol = -1;
  currentSongIndex = -1;
  activeSongNotes = [];
  clearGrid();
  document.getElementById('btnPlay').innerHTML = '&#9654; Play';
  document.getElementById('vinylRecord').classList.remove('playing');
  document.getElementById('vinylRecord').classList.remove('stopped');
  document.getElementById('nowPlaying').innerHTML = '';
  clearTimeouts();
  renderTrackList();
  drawPianoRoll();
}

function clearNotes() {
  stopPlay();
  clearGrid();
  drawPianoRoll();
}

function clearGrid() {
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      noteGrid[r][c] = false;
    }
  }
}

function clearTimeouts() {
  for (var i = 0; i < playTimeouts.length; i++) {
    clearTimeout(playTimeouts[i]);
  }
  playTimeouts = [];
}

/* ═══════════════════════════════════════
   CONTROLS
   ═══════════════════════════════════════ */
function updateBPM(val) {
  bpm = parseInt(val, 10);
  document.getElementById('bpmVal').textContent = val;
}

function updateVolume(val) {
  volume = parseInt(val, 10) / 100;
  document.getElementById('volVal').textContent = val;
  if (masterGain) masterGain.gain.value = volume;
}

/* Vinyl click to toggle play */
document.getElementById('vinylContainer').addEventListener('click', function() {
  if (isPlaying) {
    pausePlay();
  } else if (activeSongNotes.length > 0) {
    togglePlay();
  } else if (songs.length > 0) {
    loadSong(0);
  }
});

/* ═══════════════════════════════════════
   SPECTRUM VISUALIZER
   ═══════════════════════════════════════ */
var spectrumBars = [];
var spectrumRunning = false;

function initSpectrum() {
  var container = document.getElementById('spectrumBody');
  for (var i = 0; i < 48; i++) {
    var bar = document.createElement('div');
    bar.className = 'spectrum-bar';
    bar.style.height = '2px';
    container.appendChild(bar);
    spectrumBars.push(bar);
  }
}

function startSpectrum() {
  if (spectrumRunning) return;
  spectrumRunning = true;
  var bufLen = analyser.frequencyBinCount;
  var dataArr = new Uint8Array(bufLen);

  function update() {
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArr);
    var step = Math.floor(bufLen / spectrumBars.length);
    for (var i = 0; i < spectrumBars.length; i++) {
      var val = dataArr[i * step] || 0;
      var h = Math.max(2, (val / 255) * 80);
      spectrumBars[i].style.height = h + 'px';
    }
    requestAnimationFrame(update);
  }
  update();
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
renderTrackList();
initPianoRoll();
initSpectrum();
</script>
