<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" type="image/svg+xml" href="../icons/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混沌蝴蝶实验室 - Lorenz Attractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .main-canvas {
            flex: 1;
            position: relative;
        }

        #lorenzCanvas {
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
            cursor: grab;
        }

        #lorenzCanvas:active {
            cursor: grabbing;
        }

        .control-panel {
            width: 300px;
            background: rgba(26, 26, 46, 0.95);
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #333;
        }

        .control-section {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .control-section h3 {
            color: #FF6B35;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #FF6B35;
            border-radius: 50%;
            cursor: pointer;
        }

        .value-display {
            min-width: 50px;
            text-align: right;
            font-family: 'Courier New', monospace;
            color: #FF6B35;
        }

        .button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            min-width: 200px;
        }

        .info-panel h2 {
            color: #FF6B35;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .info-panel p {
            font-size: 14px;
            color: #ccc;
            line-height: 1.4;
        }

        .trajectory-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .trajectory-controls button {
            flex: 1;
            padding: 8px;
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid #FF6B35;
            border-radius: 4px;
            color: #FF6B35;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .trajectory-controls button:hover {
            background: rgba(255, 107, 53, 0.3);
        }

        .clear-button {
            background: rgba(255, 67, 67, 0.2) !important;
            border-color: #FF4343 !important;
            color: #FF4343 !important;
        }

        .clear-button:hover {
            background: rgba(255, 67, 67, 0.3) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-canvas">
            <canvas id="lorenzCanvas"></canvas>
            <div class="info-panel">
                <h2>🦋 Lorenz Attractor</h2>
                <p>拖动设置初始点，调节参数观察混沌行为</p>
            </div>
        </div>
        
        <div class="control-panel">
            <div class="control-section">
                <h3>🎯 初始值设置</h3>
                <div class="control-group">
                    <label>X₀ 初始值</label>
                    <div class="slider-container">
                        <input type="range" id="x0" min="-10" max="10" step="0.1" value="1">
                        <span class="value-display" id="x0-value">1.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Y₀ 初始值</label>
                    <div class="slider-container">
                        <input type="range" id="y0" min="-10" max="10" step="0.1" value="1">
                        <span class="value-display" id="y0-value">1.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Z₀ 初始值</label>
                    <div class="slider-container">
                        <input type="range" id="z0" min="0" max="30" step="0.1" value="1">
                        <span class="value-display" id="z0-value">1.0</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>⚙️ 洛伦兹参数</h3>
                <div class="control-group">
                    <label>σ (sigma) - 对流强度</label>
                    <div class="slider-container">
                        <input type="range" id="sigma" min="0" max="20" step="0.1" value="10">
                        <span class="value-display" id="sigma-value">10.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>ρ (rho) - 温度差</label>
                    <div class="slider-container">
                        <input type="range" id="rho" min="0" max="50" step="0.1" value="28">
                        <span class="value-display" id="rho-value">28.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>β (beta) - 几何因子</label>
                    <div class="slider-container">
                        <input type="range" id="beta" min="0" max="5" step="0.01" value="2.67">
                        <span class="value-display" id="beta-value">2.67</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>🎨 轨迹控制</h3>
                <div class="trajectory-controls">
                    <button id="start-trajectory">开始轨迹</button>
                    <button id="clear-trajectories" class="clear-button">清除轨迹</button>
                </div>
                <button class="button" id="butterfly-effect">🦋 蝴蝶效应演示</button>
            </div>

            <div class="control-section">
                <h3>📊 实时信息</h3>
                <div class="control-group">
                    <label>当前轨迹数</label>
                    <div class="value-display" id="trajectory-count">0</div>
                </div>
                <div class="control-group">
                    <label>渲染点数</label>
                    <div class="value-display" id="point-count">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class LorenzAttractor {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.setupCanvas();
                
                // 洛伦兹参数
                this.sigma = 10;
                this.rho = 28;
                this.beta = 2.67;
                
                // 初始值
                this.x = 1;
                this.y = 1;
                this.z = 1;
                
                // 轨迹数组
                this.trajectories = [];
                this.currentTrajectory = [];
                
                // 渲染参数
                this.scale = 8;
                this.offsetX = this.canvas.width / 2;
                this.offsetY = this.canvas.height / 2;
                
                // 动画控制
                this.isRunning = false;
                this.animationId = null;
                
                // 鼠标交互
                this.isDragging = false;
                this.mouseX = 0;
                this.mouseY = 0;
                
                this.setupEventListeners();
                this.setupControls();
            }
            
            setupCanvas() {
                const resizeCanvas = () => {
                    this.canvas.width = this.canvas.offsetWidth;
                    this.canvas.height = this.canvas.offsetHeight;
                    this.offsetX = this.canvas.width / 2;
                    this.offsetY = this.canvas.height / 2;
                };
                
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
            }
            
            setupEventListeners() {
                // 鼠标拖拽设置初始点
                this.canvas.addEventListener('mousedown', (e) => {
                    this.isDragging = true;
                    this.updateMousePosition(e);
                    this.isRunning = false; // 暂停动画
                    this.setInitialPosition();
                    // 自动从新起点开始新轨迹
                    this.startNewTrajectory();
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        this.updateMousePosition(e);
                    }
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    this.isDragging = false;
                });
                
                this.canvas.addEventListener('mouseleave', () => {
                    this.isDragging = false;
                });

                // 触摸支持
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.isDragging = true;
                    const touch = e.touches[0];
                    this.updateMousePosition(touch);
                    this.isRunning = false;
                    this.setInitialPosition();
                    this.startNewTrajectory();
                }, {passive: false});
                
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (this.isDragging) {
                        const touch = e.touches[0];
                        this.updateMousePosition(touch);
                    }
                }, {passive: false});
                
                this.canvas.addEventListener('touchend', () => {
                    this.isDragging = false;
                });
            }
            
            updateMousePosition(e) {
                const rect = this.canvas.getBoundingClientRect();
                this.mouseX = e.clientX - rect.left;
                this.mouseY = e.clientY - rect.top;
            }
            
            setInitialPosition() {
                // 将鼠标位置转换为3D坐标
                this.x = (this.mouseX - this.offsetX) / this.scale;
                this.y = (this.mouseY - this.offsetY) / this.scale;
                this.z = 1;
                
                // 重置当前轨迹
                this.currentTrajectory = [];
            }
            
            setupControls() {
                // 参数滑块
                const controls = ['sigma', 'rho', 'beta', 'x0', 'y0', 'z0'];
                controls.forEach(param => {
                    const slider = document.getElementById(param);
                    const valueDisplay = document.getElementById(param + '-value');
                    
                    slider.addEventListener('input', (e) => {
                        const value = parseFloat(e.target.value);
                        valueDisplay.textContent = value.toFixed(1);
                        
                        if (param === 'sigma') this.sigma = value;
                        else if (param === 'rho') this.rho = value;
                        else if (param === 'beta') this.beta = value;
                        else if (param === 'x0') this.x = value;
                        else if (param === 'y0') this.y = value;
                        else if (param === 'z0') this.z = value;
                    });
                });
                
                // 轨迹控制
                document.getElementById('start-trajectory').addEventListener('click', () => {
                    this.startNewTrajectory();
                });
                
                document.getElementById('clear-trajectories').addEventListener('click', () => {
                    this.clearTrajectories();
                });
                
                document.getElementById('butterfly-effect').addEventListener('click', () => {
                    this.butterflyEffect();
                });
            }
            
            startNewTrajectory() {
                // 保存当前轨迹
                if (this.currentTrajectory.length > 0) {
                    this.trajectories.push([...this.currentTrajectory]);
                }
                
                // 重置并开始新轨迹
                this.currentTrajectory = [{x: this.x, y: this.y, z: this.z}];
                this.isRunning = true;
                this.animate();
                
                this.updateInfo();
            }
            
            clearTrajectories() {
                this.trajectories = [];
                this.currentTrajectory = [];
                this.isRunning = false;
                
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.updateInfo();
            }
            
            butterflyEffect() {
                // 创建两个非常接近的初始条件
                const originalX = this.x;
                const originalY = this.y;
                const originalZ = this.z;
                
                // 轻微扰动
                const epsilon = 0.001;
                
                // 清除现有轨迹
                this.clearTrajectories();
                
                // 轨迹1 - 原始条件
                this.x = originalX;
                this.y = originalY;
                this.z = originalZ;
                this.currentTrajectory = [{x: this.x, y: this.y, z: this.z}];
                this.trajectories.push([...this.currentTrajectory]);
                
                // 轨迹2 - 扰动条件
                this.x = originalX + epsilon;
                this.y = originalY + epsilon;
                this.z = originalZ + epsilon;
                this.currentTrajectory = [{x: this.x, y: this.y, z: this.z}];
                this.trajectories.push([...this.currentTrajectory]);
                
                // 开始动画
                this.isRunning = true;
                this.animate();
                this.updateInfo();
            }
            
            lorenzEquations(x, y, z) {
                const dt = 0.01;
                const dx = this.sigma * (y - x) * dt;
                const dy = (x * (this.rho - z) - y) * dt;
                const dz = (x * y - this.beta * z) * dt;
                
                return {
                    x: x + dx,
                    y: y + dy,
                    z: z + dz
                };
            }
            
            project3DTo2D(x, y, z) {
                // 简单的正交投影
                const projX = this.offsetX + x * this.scale;
                const projY = this.offsetY + y * this.scale;
                
                return {x: projX, y: projY};
            }
            
            drawTrajectory(trajectory, color, alpha = 1) {
                if (trajectory.length < 2) return;
                
                this.ctx.strokeStyle = color;
                this.ctx.globalAlpha = alpha;
                this.ctx.lineWidth = 1;
                this.ctx.beginPath();
                
                for (let i = 0; i < trajectory.length - 1; i++) {
                    const start = this.project3DTo2D(
                        trajectory[i].x, trajectory[i].y, trajectory[i].z
                    );
                    const end = this.project3DTo2D(
                        trajectory[i + 1].x, trajectory[i + 1].y, trajectory[i + 1].z
                    );
                    
                    // 渐变透明度
                    const segmentAlpha = (i / trajectory.length) * alpha;
                    this.ctx.globalAlpha = segmentAlpha;
                    
                    this.ctx.moveTo(start.x, start.y);
                    this.ctx.lineTo(end.x, end.y);
                }
                
                this.ctx.stroke();
                this.ctx.globalAlpha = 1;
            }
            
            animate() {
                if (!this.isRunning) return;
                
                // 更新当前轨迹
                const currentPoint = this.currentTrajectory[this.currentTrajectory.length - 1];
                if (currentPoint) {
                    const nextPoint = this.lorenzEquations(currentPoint.x, currentPoint.y, currentPoint.z);
                    this.currentTrajectory.push(nextPoint);
                    
                    // 限制轨迹长度
                    if (this.currentTrajectory.length > 5000) {
                        this.currentTrajectory.shift();
                    }
                }
                
                // 清空画布
                this.ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制所有轨迹
                this.trajectories.forEach((trajectory, index) => {
                    const colors = ['#FF6B35', '#F7931E', '#FFD93D', '#6BCF7F', '#4D96FF'];
                    const color = colors[index % colors.length];
                    this.drawTrajectory(trajectory, color, 0.8);
                });
                
                // 绘制当前轨迹
                if (this.currentTrajectory.length > 0) {
                    this.drawTrajectory(this.currentTrajectory, '#FF6B35', 1);
                }
                
                this.updateInfo();
                
                this.animationId = requestAnimationFrame(() => this.animate());
            }
            
            updateInfo() {
                const totalTrajectories = this.trajectories.length + (this.currentTrajectory.length > 0 ? 1 : 0);
                const totalPoints = this.trajectories.reduce((sum, traj) => sum + traj.length, 0) + this.currentTrajectory.length;
                
                document.getElementById('trajectory-count').textContent = totalTrajectories;
                document.getElementById('point-count').textContent = totalPoints;
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('lorenzCanvas');
            const lorenz = new LorenzAttractor(canvas);
        });
    </script>
</body>
</html>
