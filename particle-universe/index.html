<!DOCTYPE html>
<html lang="zh">
<head>
  <link rel="icon" type="image/svg+xml" href="../icons/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粒子宇宙 | Particle Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'DM Mono', monospace; color: #c0c8e0; }
    canvas { display: block; cursor: crosshair; }

    /* Control Panel */
    .panel {
      position: fixed; left: 16px; top: 16px;
      background: rgba(8, 10, 25, 0.85);
      border: 1px solid rgba(80, 120, 255, 0.2);
      border-radius: 12px; padding: 18px;
      width: 260px; backdrop-filter: blur(12px);
      z-index: 10; font-size: 12px;
      user-select: none;
    }
    .panel h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 700;
      color: #6e8cff; margin-bottom: 14px;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .btn {
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      padding: 6px 12px; border: 1px solid rgba(110,140,255,0.4);
      border-radius: 6px; background: rgba(30,40,80,0.6);
      color: #8ea4ff; cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn:hover { background: rgba(60,80,160,0.6); border-color: #6e8cff; color: #fff; }
    .btn.active { background: rgba(80,120,255,0.3); border-color: #6e8cff; color: #fff; }

    .param { margin-bottom: 10px; }
    .param label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #7888aa; margin-bottom: 4px;
    }
    .param label span.val { color: #a0b4ff; font-weight: 500; }
    input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none;
      background: rgba(80,120,255,0.15); border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #6e8cff; cursor: pointer;
      border: 2px solid #1a1a3a;
    }
    .toggle-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; font-size: 11px; color: #7888aa;
    }
    .toggle {
      width: 32px; height: 16px; border-radius: 8px;
      background: rgba(40,50,80,0.8); cursor: pointer;
      position: relative; border: 1px solid rgba(80,120,255,0.3);
    }
    .toggle.on { background: rgba(80,120,255,0.5); border-color: #6e8cff; }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #556; transition: all 0.2s;
    }
    .toggle.on::after { left: 18px; background: #fff; }

    /* Stats Panel */
    .stats {
      position: fixed; right: 16px; top: 16px;
      background: rgba(8, 10, 25, 0.75);
      border: 1px solid rgba(80, 120, 255, 0.15);
      border-radius: 10px; padding: 14px 18px;
      backdrop-filter: blur(10px); z-index: 10;
      font-size: 11px; min-width: 180px;
    }
    .stats h3 {
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      color: #556688; margin-bottom: 10px; letter-spacing: 2px;
    }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .stat-row .label { color: #556688; }
    .stat-row .value { color: #a0b4ff; font-weight: 500; }

    /* Title */
    .title {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900;
      color: rgba(110,140,255,0.6); letter-spacing: 4px;
      text-transform: uppercase; z-index: 10; pointer-events: none;
      text-shadow: 0 0 30px rgba(80,120,255,0.3);
    }

    /* Help hint */
    .hint {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(120,140,180,0.4);
      z-index: 10; pointer-events: none; letter-spacing: 1px;
    }

    /* Follow indicator */
    .follow-badge {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, 60px);
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      color: rgba(255,150,80,0.7); letter-spacing: 2px;
      z-index: 10; pointer-events: none; display: none;
    }

    @media (max-width: 700px) {
      .panel { width: 200px; padding: 12px; font-size: 11px; left: 8px; top: 8px; }
      .stats { right: 8px; top: 8px; padding: 10px 12px; min-width: 140px; font-size: 10px; }
      .title { font-size: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="title">PARTICLE UNIVERSE</div>

  <div class="panel">
    <h2>⚛ Controls</h2>
    <div class="btn-row">
      <button class="btn" id="btnBang">BIG BANG</button>
      <button class="btn" id="btnPause">PAUSE</button>
      <button class="btn" id="btnFollow">FOLLOW</button>
    </div>

    <div class="param">
      <label>Speed <span class="val" id="valSpeed">1.0x</span></label>
      <input type="range" id="sliderSpeed" min="0.1" max="10" step="0.1" value="1">
    </div>
    <div class="param">
      <label>Gravity G <span class="val" id="valG">0.50</span></label>
      <input type="range" id="sliderG" min="0.01" max="2" step="0.01" value="0.5">
    </div>
    <div class="param">
      <label>Particles <span class="val" id="valCount">1500</span></label>
      <input type="range" id="sliderCount" min="100" max="5000" step="100" value="1500">
    </div>
    <div class="param">
      <label>Initial Velocity <span class="val" id="valVel">2.0</span></label>
      <input type="range" id="sliderVel" min="0.5" max="10" step="0.1" value="2">
    </div>
    <div class="param">
      <label>Merge Distance <span class="val" id="valMerge">3.0</span></label>
      <input type="range" id="sliderMerge" min="0.5" max="10" step="0.1" value="3">
    </div>
    <div class="param">
      <label>Time Step <span class="val" id="valDt">0.50</span></label>
      <input type="range" id="sliderDt" min="0.1" max="2" step="0.05" value="0.5">
    </div>

    <div class="toggle-row">
      <div class="toggle" id="toggleTrails"></div>
      <span>Show Trails</span>
    </div>
  </div>

  <div class="stats">
    <h3>📊 OBSERVATION</h3>
    <div class="stat-row"><span class="label">Particles</span><span class="value" id="statParticles">0</span></div>
    <div class="stat-row"><span class="label">Black Holes</span><span class="value" id="statBlackHoles">0</span></div>
    <div class="stat-row"><span class="label">Galaxies</span><span class="value" id="statGalaxies">0</span></div>
    <div class="stat-row"><span class="label">Avg Speed</span><span class="value" id="statSpeed">0.00</span></div>
    <div class="stat-row"><span class="label">Sim Time</span><span class="value" id="statTime">0.0</span></div>
    <div class="stat-row"><span class="label">FPS</span><span class="value" id="statFPS">60</span></div>
  </div>

  <div class="follow-badge" id="followBadge">◉ FOLLOWING</div>
  <div class="hint">Scroll: Zoom · Drag: Pan · Click: Add particle · Drag: Launch particle · Right-click: Black hole</div>

  <script src="simulation.js"></script>
  <script src="renderer.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const sim = new Simulation();
    const ren = new Renderer(canvas);

    // UI Elements
    const $ = id => document.getElementById(id);
    const btnBang = $('btnBang'), btnPause = $('btnPause'), btnFollow = $('btnFollow');
    const toggleTrails = $('toggleTrails');
    const followBadge = $('followBadge');

    // Sliders
    const sliders = {
      speed: { el: $('sliderSpeed'), val: $('valSpeed'), fmt: v => v.toFixed(1) + 'x' },
      G: { el: $('sliderG'), val: $('valG'), fmt: v => v.toFixed(2) },
      count: { el: $('sliderCount'), val: $('valCount'), fmt: v => Math.round(v) },
      vel: { el: $('sliderVel'), val: $('valVel'), fmt: v => v.toFixed(1) },
      merge: { el: $('sliderMerge'), val: $('valMerge'), fmt: v => v.toFixed(1) },
      dt: { el: $('sliderDt'), val: $('valDt'), fmt: v => v.toFixed(2) }
    };

    for (const [key, s] of Object.entries(sliders)) {
      s.el.addEventListener('input', () => {
        const v = parseFloat(s.el.value);
        s.val.textContent = s.fmt(v);
        switch (key) {
          case 'speed': sim.speed = v; break;
          case 'G': sim.G = v; break;
          case 'merge': sim.mergeThreshold = v; break;
          case 'dt': sim.dt = v; break;
        }
      });
    }

    // Buttons
    btnBang.addEventListener('click', () => {
      const count = Math.round(parseFloat(sliders.count.el.value));
      const vel = parseFloat(sliders.vel.el.value);
      ren.followParticle = null;
      ren.camera = { x: 0, y: 0, zoom: 1 };
      sim.bigBang(count, vel);
      btnPause.textContent = 'PAUSE';
      btnPause.classList.remove('active');
    });

    btnPause.addEventListener('click', () => {
      sim.paused = !sim.paused;
      btnPause.textContent = sim.paused ? 'PLAY' : 'PAUSE';
      btnPause.classList.toggle('active', sim.paused);
    });

    btnFollow.addEventListener('click', () => {
      if (ren.followParticle) {
        ren.followParticle = null;
        btnFollow.classList.remove('active');
        followBadge.style.display = 'none';
      } else {
        // Find most massive particle
        let best = null, bestMass = 0;
        for (const p of sim.particles) {
          if (p.mass > bestMass) { bestMass = p.mass; best = p; }
        }
        if (best) {
          ren.followParticle = best;
          btnFollow.classList.add('active');
          followBadge.style.display = 'block';
        }
      }
    });

    toggleTrails.addEventListener('click', () => {
      ren.showTrails = !ren.showTrails;
      toggleTrails.classList.toggle('on', ren.showTrails);
    });

    // Mouse interaction
    let isDragging = false, dragStart = null, dragCurrent = null;
    let isCreating = false, createStart = null;

    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 2) return; // right click handled separately
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

      // Check if click is on UI panels
      if (sx < 280 && sy < 450) return;

      isDragging = true;
      dragStart = { sx, sy, wx: ren.camera.x, wy: ren.camera.y, time: Date.now() };
      dragCurrent = { sx, sy };
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      dragCurrent = { sx, sy };

      if (dragStart && Date.now() - dragStart.time > 150) {
        // Pan
        const dx = (sx - dragStart.sx) / ren.camera.zoom;
        const dy = (sy - dragStart.sy) / ren.camera.zoom;
        ren.camera.x = dragStart.wx - dx;
        ren.camera.y = dragStart.wy - dy;
        if (ren.followParticle) {
          ren.followParticle = null;
          btnFollow.classList.remove('active');
          followBadge.style.display = 'none';
        }
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (e.button === 2) return;
      if (isDragging && dragStart && dragCurrent) {
        const dx = dragCurrent.sx - dragStart.sx;
        const dy = dragCurrent.sy - dragStart.sy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const elapsed = Date.now() - dragStart.time;

        if (elapsed < 150 && dist < 5) {
          // Click → add particle
          const world = ren.screenToWorld(dragStart.sx, dragStart.sy);
          sim.particles.push(new Particle(world.x, world.y, 0, 0, 1 + Math.random() * 3));
        } else if (dist > 10) {
          // Drag → launch particle cluster
          const world = ren.screenToWorld(dragStart.sx, dragStart.sy);
          const vx = dx * 0.02 / ren.camera.zoom;
          const vy = dy * 0.02 / ren.camera.zoom;
          for (let i = 0; i < 5; i++) {
            const spread = 3;
            sim.particles.push(new Particle(
              world.x + (Math.random() - 0.5) * spread,
              world.y + (Math.random() - 0.5) * spread,
              vx + (Math.random() - 0.5) * 0.5,
              vy + (Math.random() - 0.5) * 0.5,
              0.5 + Math.random() * 2
            ));
          }
        }
      }
      isDragging = false; dragStart = null; dragCurrent = null;
    });

    // Right click → black hole
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      const world = ren.screenToWorld(sx, sy);
      const bh = new Particle(world.x, world.y, 0, 0, sim.bhThreshold + 100);
      bh.isBlackHole = true;
      bh.temperature = 0;
      sim.particles.push(bh);
    });

    // Scroll → zoom
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      const worldBefore = ren.screenToWorld(sx, sy);

      const factor = e.deltaY > 0 ? 0.9 : 1.1;
      ren.camera.zoom = Math.max(0.01, Math.min(50, ren.camera.zoom * factor));

      const worldAfter = ren.screenToWorld(sx, sy);
      ren.camera.x += worldBefore.x - worldAfter.x;
      ren.camera.y += worldBefore.y - worldAfter.y;
    }, { passive: false });

    // Touch support
    let touches = {};
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        touches[t.identifier] = { sx: t.clientX, sy: t.clientY, time: Date.now() };
      }
      if (e.touches.length === 1) {
        const t = e.touches[0];
        isDragging = true;
        dragStart = { sx: t.clientX, sy: t.clientY, wx: ren.camera.x, wy: ren.camera.y, time: Date.now() };
      }
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 1 && isDragging && dragStart) {
        const t = e.touches[0];
        const dx = (t.clientX - dragStart.sx) / ren.camera.zoom;
        const dy = (t.clientY - dragStart.sy) / ren.camera.zoom;
        ren.camera.x = dragStart.wx - dx;
        ren.camera.y = dragStart.wy - dy;
      } else if (e.touches.length === 2) {
        // Pinch zoom
        const t1 = e.touches[0], t2 = e.touches[1];
        const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        if (touches._lastPinchDist) {
          const factor = dist / touches._lastPinchDist;
          ren.camera.zoom = Math.max(0.01, Math.min(50, ren.camera.zoom * factor));
        }
        touches._lastPinchDist = dist;
      }
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
      for (const t of e.changedTouches) delete touches[t.identifier];
      if (e.touches.length < 2) touches._lastPinchDist = null;
      if (e.touches.length === 0) { isDragging = false; dragStart = null; }
    });

    // Update stats display
    function updateStats(fps) {
      $('statParticles').textContent = sim.stats.particles.toLocaleString();
      $('statBlackHoles').textContent = sim.stats.blackHoles;
      $('statGalaxies').textContent = sim.galaxyCount;
      $('statSpeed').textContent = sim.stats.avgSpeed.toFixed(2);
      $('statTime').textContent = sim.stats.simTime.toFixed(1);
      $('statFPS').textContent = fps.toFixed(0);
    }

    // Main loop
    let lastTime = performance.now();
    let frameCount = 0, fpsTime = 0, currentFPS = 60;

    function loop(now) {
      requestAnimationFrame(loop);
      const delta = now - lastTime;
      lastTime = now;
      frameCount++;
      fpsTime += delta;
      if (fpsTime >= 500) {
        currentFPS = frameCount / (fpsTime / 1000);
        frameCount = 0;
        fpsTime = 0;
        updateStats(currentFPS);
      }

      sim.step();
      ren.render(sim, now);
    }

    requestAnimationFrame(loop);

    // Auto-start with a big bang
    sim.bigBang(1500, 2);
  </script>
</body>
</html>
